// Auto-suggest metric value updates from activity text
function suggestMetricUpdatesFromActivity(a,text){
  const metrics=(a.notes?.metrics||[]);
  if(!metrics.length||!text)return;
  const t=text.toLowerCase();
  const suggestions=[];
  // Look for dollar amounts
  const dollarMatch=t.match(/\$\s*([\d,.]+)\s*(m|k|million|thousand)?/i);
  if(dollarMatch){
    let val=parseFloat(dollarMatch[1].replace(/,/g,""));
    if(dollarMatch[2]&&(dollarMatch[2].toLowerCase()==="m"||dollarMatch[2].toLowerCase()==="million"))val*=1000000;
    if(dollarMatch[2]&&(dollarMatch[2].toLowerCase()==="k"||dollarMatch[2].toLowerCase()==="thousand"))val*=1000;
    // Find a $ metric
    const dollarMetric=metrics.find(m=>m.unit==="$"||m.unit==="\u20ac");
    if(dollarMetric&&val>0)suggestions.push({metricId:dollarMetric.id,metric:dollarMetric.metric,suggestedValue:String(val),evidence:dollarMatch[0]});
  }
  // Look for percentages
  const pctMatches=[...t.matchAll(/(\d{1,3})\s*%/g)];
  pctMatches.forEach(pm=>{
    const val=parseInt(pm[1]);
    if(val>0&&val<=100){
      const pctMetric=metrics.find(m=>m.unit==="%"&&!suggestions.find(s=>s.metricId===m.id));
      if(pctMetric)suggestions.push({metricId:pctMetric.id,metric:pctMetric.metric,suggestedValue:String(val),evidence:pm[0]});
    }
  });
  // Look for qualitative assessments
  if(t.includes("rated")&&t.includes("high")||t.includes("excellent")||t.includes("outstanding")){
    const qualMetric=metrics.find(m=>m.type==="qualitative"&&!suggestions.find(s=>s.metricId===m.id));
    if(qualMetric)suggestions.push({metricId:qualMetric.id,metric:qualMetric.metric,suggestedValue:"High",evidence:"Positive assessment language detected"});
  }
  if(suggestions.length>0){
    S.pendingMetricUpdates=suggestions;
    // Don't show modal — show a subtle toast-style suggestion after render
  }
  return suggestions;
}

function autoTagActivityToMetrics(a,text){
  const metrics=(a.notes?.metrics||[]);
  if(!metrics.length||!text)return[];
  const t=text.toLowerCase();
  const links=[];
  metrics.forEach(m=>{
    const name=m.metric.toLowerCase();
    // Extract keywords from metric name
    const words=name.split(/[\s\-\/,]+/).filter(w=>w.length>3);
    // Check if activity text mentions any metric keywords
    const match=words.some(w=>t.includes(w));
    // Also check common associations
    const associations={
      "adopt":["training","onboard","activation","login","user","SSO","walkthrough","enablement"],
      "saving":["benchmark","negotiat","cost","price","contract","renegotiat","saving","ROI","value"],
      "risk":["supplier","risk","alert","disruption","monitor","SRM"],
      "time":["research","hours","manual","automat","faster","speed","abi","query"],
      "value":["QBR","review","executive","CPO","champion","advocate","present"],
      "expan":["upsell","cross-sell","expansion","new team","new site","additional","phase 2","budget"]
    };
    const assocMatch=Object.entries(associations).some(([key,terms])=>{
      return name.includes(key)&&terms.some(term=>t.includes(term.toLowerCase()));
    });
    if(match||assocMatch)links.push({metricId:m.id});
  });
  return links;
}

function onSearchInput(val){
  S.searchQuery=val;
  S.searchActiveIdx=-1;
  if(!val||val.length<2){S.searchResults=null;S.searchOpen=false;var dd=document.getElementById("gsearch-dropdown");if(dd)dd.remove();return;}
  var q=val.toLowerCase();
  var results=[];
  ACCOUNTS.forEach(function(a){
    var n=a.notes||{};
    if(a.name.toLowerCase().includes(q))results.push({type:"account",acctId:a.id,title:a.name,sub:a.industry+" \u00b7 "+a.csm+" \u00b7 Health: "+calcHealth(a,S.period).score,score:a.name.toLowerCase().startsWith(q)?100:50});
    (a.softSignals||[]).filter(function(s){return !s.hidden;}).forEach(function(s){
      if((s.signal+s.desc).toLowerCase().includes(q))results.push({type:"signal",acctId:a.id,acctName:a.name,title:s.signal,sub:s.type+" \u00b7 "+s.impact+" \u00b7 "+fd(s.date),score:30});
    });
    (a.activityFeed||[]).filter(function(x){return !x.hidden;}).forEach(function(act){
      if((act.title+act.summary).toLowerCase().includes(q))results.push({type:"activity",acctId:a.id,acctName:a.name,title:act.title,sub:fd(act.date)+" \u00b7 "+act.addedBy,score:25});
    });
    (n.kitStakeholders||[]).forEach(function(c){
      if((c.name+c.title).toLowerCase().includes(q))results.push({type:"contact",acctId:a.id,acctName:a.name,title:c.name,sub:c.title+" \u00b7 "+c.role,score:35});
    });
    ["engagementObjective","sol_valueDefinition","sol_proposedSolution"].forEach(function(k){
      if(n[k]&&n[k].toLowerCase().includes(q))results.push({type:"kit",acctId:a.id,acctName:a.name,title:k.replace(/sol_/,"").replace(/([A-Z])/g," $1").trim(),sub:n[k].slice(0,80)+"...",score:15});
    });
  });
  results.sort(function(a,b){return b.score-a.score;});
  S.searchResults=results.slice(0,12);
  S.searchOpen=true;
  // Update dropdown WITHOUT full re-render (preserves focus)
  var existing=document.getElementById("gsearch-dropdown");
  if(existing)existing.remove();
  var container=document.querySelector(".gsearch");
  if(container){
    var dropHTML=buildSearchDropdown();
    if(dropHTML){
      var div=document.createElement("div");
      div.id="gsearch-dropdown";
      div.innerHTML=dropHTML;
      container.appendChild(div.firstChild||div);
    }
  }
}

function buildSearchDropdown(){
  var results=S.searchResults||[];
  if(!results.length)return '<div class="gsearch-drop"><div class="gs-empty">No results for "'+S.searchQuery+'"<div style="font-size:11px;color:#94a3b8;margin-top:4px">Try searching by account name, contact, or signal keyword</div></div></div>';
  var groups={account:[],signal:[],contact:[],activity:[],kit:[]};
  var labels={account:"ACCOUNTS",signal:"SOFT SIGNALS",contact:"CONTACTS",activity:"ACTIVITY",kit:"ACCOUNT KIT"};
  results.forEach(function(r){if(groups[r.type])groups[r.type].push(r);});
  var q=S.searchQuery.toLowerCase();
  function highlight(text){
    if(!text||!q)return text||"";
    var idx=text.toLowerCase().indexOf(q);
    if(idx<0)return text;
    return text.slice(0,idx)+"<mark>"+text.slice(idx,idx+q.length)+"</mark>"+text.slice(idx+q.length);
  }
  var idx=0;
  var html='<div class="gsearch-drop">';
  Object.entries(groups).forEach(function(entry){
    var type=entry[0],items=entry[1];
    if(!items.length)return;
    html+='<div class="gs-group">'+labels[type]+'</div>';
    items.forEach(function(r){
      var isActive=idx===S.searchActiveIdx;
      var nav=type==="account"?"landing":type==="signal"?"signals":type==="contact"?"kit":type==="activity"?"feed":"kit";
      html+='<div class="gs-item '+(isActive?"gs-active":"")+'" onclick="S.searchQuery=\'\';S.searchResults=null;S.searchOpen=false;openAcct(\''+r.acctId+'\');set({tab:\''+nav+'\'})">';
      if(r.acctName)html+='<span class="gs-acct-pill">'+(r.acctName.length>20?r.acctName.slice(0,20)+"\u2026":r.acctName)+'</span>';
      html+='<div style="flex:1;min-width:0"><div class="gs-item-title">'+highlight(r.title)+'</div><div class="gs-item-sub">'+highlight(r.sub)+'</div></div></div>';
      idx++;
    });
  });
  html+='</div>';
  return html;
}

function buildAIContext(a){
  if(!a)return"";
  var h=calcHealth(a,S.period);
  var n=a.notes||{};
  var mode=getAccountMode(a);
  var contacts=(n.kitStakeholders||[]).map(function(c){return c.name+" \u00b7 "+c.title+" \u00b7 "+c.role;}).join("\n");
  var signals=(a.softSignals||[]).filter(function(s){return !s.hidden&&s.status==="active";}).slice(0,8).map(function(s){return s.signal+" \u00b7 "+s.type+" \u00b7 "+s.impact+" \u00b7 "+fd(s.date);}).join("\n");
  var metrics=(n.metrics||n.mt_metrics||n.sh_successMetrics||[]).slice(0,6).map(function(m){
    if(m.currentValue!==undefined){return m.metric+" \u00b7 Target: "+(m.target||"N/A")+" \u00b7 Current: "+(m.currentValue||"N/A")+" \u00b7 "+calcMetricStatusV18(m);}
    var cps=m.checkpoints||{};var cpOrder=["q12","q11","q10","q9","q8","q7","q6","q5","q4","q3","q2","q1","baseline"];
    var latest=null;for(var i=0;i<cpOrder.length;i++){if(cps[cpOrder[i]]!=null&&cps[cpOrder[i]]!==""){latest=cps[cpOrder[i]];break;}}
    return m.metric+" \u00b7 Target: "+(m.target||"N/A")+" \u00b7 Current: "+(latest||"N/A")+" \u00b7 "+calcMetricStatus(m).status;
  }).join("\n");
  var recentAct=(a.activityFeed||[]).filter(function(x){return !x.hidden;}).slice(0,3).map(function(act){return fd(act.date)+" \u00b7 "+act.type+" \u00b7 "+act.title;}).join("\n");
  var plays=(a.plan&&a.plan.plays||[]).filter(function(p){return !p.hidden;}).slice(0,5).map(function(p){return p.title+" \u00b7 $"+(p.value/1000).toFixed(0)+"K \u00b7 "+getStageName(p.prob)+" ("+p.prob+"%) \u00b7 "+p.when;}).join("\n");

async function sendAIMessage(text){
  var a=S.acctId?cur():null;
  if(!a)return;
  var input=text||((document.getElementById("ai-input")||{}).value||"").trim();
  if(!input)return;
  var ts=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  S.aiMessages.push({role:"user",content:input,timestamp:ts});
  S.aiSending=true;render();
  requestAnimationFrame(function(){var el=document.getElementById("ai-messages");if(el)el.scrollTop=el.scrollHeight;});
  var inp=document.getElementById("ai-input");if(inp)inp.value="";
  // If no API key — fall back to demo mode
  if(!S.anthropicKey||!S.anthropicKey.trim()){
    var reply=generateSimulatedAIResponse(a,input);
    setTimeout(function(){
      S.aiMessages.push({role:"assistant",content:reply+"\n\n*Demo mode \u2014 add API key for live Claude responses.*",timestamp:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});
      S.aiSending=false;render();
      requestAnimationFrame(function(){var el=document.getElementById("ai-messages");if(el)el.scrollTop=el.scrollHeight;});
    },800);
    return;
  }
  // Live API call
  try{
    var history=S.aiMessages.slice(0,-1).map(function(m){return{role:m.role,content:m.content};});
    var response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":S.anthropicKey.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:buildAIContext(a),messages:[...history,{role:"user",content:input}]})
    });
    if(!response.ok)throw new Error("API error "+response.status);
    var data=await response.json();
    var replyText=(data.content||[]).filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("\n")||"No response received.";
    S.aiMessages.push({role:"assistant",content:replyText,timestamp:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});
  }catch(err){
    S.aiMessages.push({role:"assistant",content:"\u26a0\ufe0f Could not reach Claude API. "+(err.message||"Check your API key.")+"\n\nFalling back to demo mode:\n\n"+generateSimulatedAIResponse(a,input),timestamp:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})});
  }
  S.aiSending=false;render();
  requestAnimationFrame(function(){var el=document.getElementById("ai-messages");if(el)el.scrollTop=el.scrollHeight;});
}

// ── Data Extraction Helper ──
function extractAccountData(acctId){
  var a=ACCOUNTS.find(function(x){return x.id===acctId;});
  if(!a)return null;
  var h=calcHealth(a,S.period);
  var m=h.m||getMets(a,S.period);
  var n=a.notes||{};
  var signals=(a.softSignals||[]).filter(function(s){return !s.hidden&&s.status==="active";});
  var plays=(a.plan?.plays||[]).filter(function(p){return !p.hidden;});
  var cats=(a.catIntel?.topCats||[]).filter(function(c){return c.visits>0;});
  var cm=a.modulesIntel?.abi?.complexityMix||{l1a:0,l1m:0,l2:0,l3:0,l4:0};
  var smArr=n.metrics||n.mt_metrics||n.sh_successMetrics||[];
  var bvdCycles=n.bvd_cycles||[];
  var activities=(a.activityFeed||[]).filter(function(x){return !x.hidden;}).slice(0,10);
  var todos=getKeyTodos(a);
  var mode=getAccountMode(a);
  var ML12=["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
  var s6=a.l6?a.l6/6:0;
  var loginTrend=a.hasData?[s6*.7,s6*.8,s6*.85,s6*.9,s6,a.l3/3*.9,a.l3/3,a.l3/3*.95,a.l3/3*1.05,a.l3/3,a.l3/3*.9,a.l1].map(Math.round):[];
  var adoptionPct=a.lu>0?Math.round((a.a3/a.lu)*100):0;
  var topUsers=[
    {name:"User A (Category Mgr)",logins:Math.round((m?.logins||0)*0.18),hours:Math.round((m?.hours||0)*0.2)},
    {name:"User B (Sr. Analyst)",logins:Math.round((m?.logins||0)*0.14),hours:Math.round((m?.hours||0)*0.16)},
    {name:"User C (Sourcing Lead)",logins:Math.round((m?.logins||0)*0.11),hours:Math.round((m?.hours||0)*0.12)},
    {name:"User D (VP Procurement)",logins:Math.round((m?.logins||0)*0.08),hours:Math.round((m?.hours||0)*0.09)},
    {name:"User E (Buyer)",logins:Math.round((m?.logins||0)*0.06),hours:Math.round((m?.hours||0)*0.07)}
  ];
  return{a:a,h:h,m:m,n:n,signals:signals,plays:plays,cats:cats,cm:cm,smArr:smArr,bvdCycles:bvdCycles,activities:activities,todos:todos,mode:mode,ML12:ML12,loginTrend:loginTrend,adoptionPct:adoptionPct,topUsers:topUsers};
}

}

// Ensure signed accounts have success contract drafted (runs every render, idempotent)
function ensureAccountDefaults(){
  ACCOUNTS.forEach(a=>{
    const n=a.notes||{};if(!a.notes)a.notes={};
    if(!n.gate_signed)return;
    // Auto-draft success contract if missing
    if(!n.successContract)n.successContract={};
    if(!n.successContract.metric1){
      const shm=n.sh_successMetrics||n.mt_metrics||[];
      if(shm.length>0){
        n.successContract.metric1=shm[0].metric||'';
        n.successContract.metric1Unit=shm[0].unit||'$';
        if(shm.length>1)n.successContract.metric2=shm[1].metric||'';
        const owner=n.sh_stakeholderSignoff?n.sh_stakeholderSignoff.split(',')[0].trim():'';
        n.successContract.measureSource='Validated by '+(owner||'procurement team')+' using Beroe data vs actuals';
        n.successContract.measureFreq='Quarterly';
        n.successContract.measureOwner=owner;
      }
      if(n.sol_valueDefinition)n.successContract.valueNarrative=n.sol_valueDefinition.length>200?n.sol_valueDefinition.slice(0,200):n.sol_valueDefinition;
    }
    // Auto-seed goals if missing
    if(!n.csGoals||n.csGoals.length===0){
      n.csGoals=[];
      const shm=n.sh_successMetrics||n.mt_metrics||[];
      const mNames=(shm||[]).map(m=>(m.metric||'').toLowerCase()).join(' ');
      if(mNames.includes('sav')||mNames.includes('cost')||mNames.includes('negotiat'))n.csGoals.push({type:'savings',targetValue:shm.find(m=>(m.metric||'').toLowerCase().match(/sav|cost/))?.target||'',targetDate:n.gate_renewalDate||'',owner:n.successContract?.measureOwner||'',locked:false,initiatives:[]});
      if(mNames.includes('vendor')||mNames.includes('supplier')||mNames.includes('consolidat')||mNames.includes('risk'))n.csGoals.push({type:'vendor',targetValue:'',targetDate:n.gate_renewalDate||'',owner:'',locked:false,initiatives:[]});
      if(mNames.includes('adopt')||mNames.includes('usage')||mNames.includes('engagement'))n.csGoals.push({type:'adoption',targetValue:shm.find(m=>(m.metric||'').toLowerCase().match(/adopt|usage/))?.target||'',targetDate:n.gate_renewalDate||'',owner:'',locked:false,initiatives:[]});
    }
    // Ensure metrics migrated
    if(!n.metrics&&n.mt_metrics)migrateMetrics(n);
  });
}
// Compute and persist red flag status for all accounts on every render
function computeRedFlags(){
  ACCOUNTS.forEach(a=>{
    const n=a.notes||{};
    if(!n.gate_signed&&!(n.csEntryType==='B'&&n.csEntryB_context))return;
    const cps=n.checkpoints||[];
    const metrics=n.metrics||n.mt_metrics||[];
    const signals=(a.softSignals||[]).filter(s=>!s.hidden&&s.status==='active');
    const missedCP=cps.some(cp=>cp.status==='not_held'&&cp.scheduledDate&&(demoNow()-new Date(cp.scheduledDate))/(86400000)>7);
    const disengaged=signals.some(s=>s.type==='risk'&&s.desc&&s.desc.toLowerCase().includes('unresponsive'));
    const noValue=a.dtr&&a.dtr<=60&&!metrics.some(m=>parseFloat(m.currentValue)>0);
    const escalation=signals.some(s=>s.type==='critical');
    const hasRedFlag=missedCP||disengaged||noValue||escalation;
    if(!n.dualTrack)n.dualTrack={renewal:{status:'on_track'},expand:{status:'on_track'}};
    if(hasRedFlag&&!n.dualTrackOverride){n.dualTrack.expand.status='paused';n.dualTrack.renewal.status='red';}
    else if(!hasRedFlag){n.dualTrack.expand.status='on_track';n.dualTrack.renewal.status='on_track';}
  });
}

function render(){
  updateSignalStatuses();
  ensureAccountDefaults();
  computeRedFlags();
  const scrollContainer=document.querySelector('[style*="overflow-y:auto"]')||document.querySelector('.main > div');
  const scrollY=scrollContainer?scrollContainer.scrollTop:0;
  document.getElementById("root").innerHTML=S.user?buildShell():buildLogin();
  afterRender();
  requestAnimationFrame(()=>{
    const el=document.querySelector('[style*="overflow-y:auto"]')||document.querySelector('.main > div');
    if(el)el.scrollTop=scrollY;
  });
}

document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();var el=document.getElementById("gsearch-input");if(el)el.focus();}
  if((e.metaKey||e.ctrlKey)&&e.key==="/"){e.preventDefault();set({aiPanelOpen:!S.aiPanelOpen});}
  if(e.key==="Escape"){
    if(S.searchOpen){S.searchQuery="";S.searchResults=null;S.searchOpen=false;render();return;}
    if(S.aiPanelOpen){set({aiPanelOpen:false});}
  }
  if(S.searchOpen&&S.searchResults&&S.searchResults.length){
    if(e.key==="ArrowDown"){e.preventDefault();S.searchActiveIdx=Math.min(S.searchActiveIdx+1,S.searchResults.length-1);render();}
    if(e.key==="ArrowUp"){e.preventDefault();S.searchActiveIdx=Math.max(S.searchActiveIdx-1,-1);render();}
    if(e.key==="Enter"&&S.searchActiveIdx>=0){e.preventDefault();var r=S.searchResults[S.searchActiveIdx];if(r){var nav=r.type==="account"?"home":r.type==="signal"?"deep":r.type==="contact"?"kit":r.type==="activity"?"deep":"kit";var ds=r.type==="signal"?"strategy":r.type==="activity"?"strategy":null;S.searchQuery="";S.searchResults=null;S.searchOpen=false;openAcct(r.acctId);set({tab:nav,deepSection:ds});}}
  }
});
document.addEventListener("click",function(e){if(S.searchOpen&&!e.target.closest(".gsearch")){S.searchOpen=false;S.searchResults=null;render();}});
