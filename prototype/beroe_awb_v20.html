        const lockTitle=t.id==='checkpoints'?'Complete the success contract first':'Complete at least one checkpoint first';
        if(locked)return'<button style="padding:8px 16px;border-radius:8px;border:1.5px solid var(--cb);background:#f8f9fc;color:#c0c8d8;font-size:12px;font-weight:500;pointer-events:none;display:flex;align-items:center;gap:6px;opacity:0.4" title="'+lockTitle+'">'+t.label+'<span class="pill pgr" style="font-size:8px;padding:1px 6px">\ud83d\udd12</span></button>';
        return'<button style="padding:8px 16px;border-radius:8px;border:1.5px solid '+(act?'#FD576B40':'var(--cb)')+';background:'+(act?'#fff0f2':'#fff')+';color:'+(act?'#FD576B':'var(--t2)')+';font-size:12px;font-weight:'+(act?'700':'500')+';cursor:pointer;display:flex;align-items:center;gap:6px" onclick="set({smSubTab:\''+t.id+'\'})">'+t.label+'<span class="pill '+t.badge+'" style="font-size:8px;padding:1px 6px">'+(t.badge==='pg'?'\u2713':t.badge==='pr'?'!':'\u2022')+'</span></button>';
      }).join("")}
    </div>

    ${S.smSubTab==="contract"?bContractAndGoals(a):
      S.smSubTab==="metrics"?bMetricsPane(a):
      S.smSubTab==="checkpoints"?bCheckpoints(a):
      S.smSubTab==="vdd"?bVDDPane(a):
      S.smSubTab==="renewal"?bDeliveryRenewal(a):
      bContractAndGoals(a)}
  </div>`;
}

// v19: Original metrics pane (now a sub-tab)
function bMetricsPane(a){
  const n=a.notes||{};
  // Fallback: migrate mt_metrics into metrics if not already done
  if(!n.metrics&&n.mt_metrics){migrateMetrics(n);}
  const metrics=n.metrics||n.mt_metrics||[];
  const canCS=canEditSection("CS");
  if(metrics.length===0){
    return`<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:28px;margin-bottom:10px">\ud83c\udfaf</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:6px">No success metrics defined yet</div>
      <div style="font-size:12px;color:var(--t3);margin-bottom:16px;max-width:400px;margin-left:auto;margin-right:auto">Define goals and lock the success contract first. Then metrics will flow here automatically.</div>
      <button class="btn bp" onclick="addMetric('${a.id}')">+ Add a metric</button>
      <button class="btn bs" style="margin-left:8px" onclick="quickSetupMetrics('${a.id}')">Quick Setup (Demo)</button>
    </div>`;
  }

  // Overall progress bar
  const quantMets=metrics.filter(m=>m.type!=='qualitative'&&m.target&&m.currentValue);
  const topMet=quantMets[0];
  const topPct=topMet?Math.min(100,Math.round(parseFloat(String(topMet.currentValue).replace(/[^0-9.]/g,''))/parseFloat(String(topMet.target).replace(/[^0-9.]/g,''))*100)):0;

  return`<div>
    <!-- Overall value summary -->
    ${topMet?`<div class="card" style="margin-bottom:14px;padding:14px 18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:14px;font-weight:700">Value Delivered</span>
        <span style="font-size:12px;color:var(--t3)">${metrics.length} metrics tracked</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="flex:1">
          <div class="acv-bg" style="height:14px"><div class="acv-fill" style="width:${topPct}%;background:${topPct>=75?'#40CC8F':topPct>=50?'#4A00F8':'#EF9637'};height:14px"></div></div>
        </div>
        <span style="font-size:18px;font-weight:800;color:${topPct>=75?'#40CC8F':topPct>=50?'#4A00F8':'#EF9637'}">${topPct}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:4px">
        <span>Current: ${topMet.unit==='$'||topMet.unit==='\u20ac'?topMet.unit:''}${parseFloat(String(topMet.currentValue).replace(/[^0-9.]/g,'')).toLocaleString()}${topMet.unit&&topMet.unit!=='$'&&topMet.unit!=='\u20ac'?topMet.unit:''}</span>
        <span>Target: ${topMet.unit==='$'||topMet.unit==='\u20ac'?topMet.unit:''}${parseFloat(String(topMet.target).replace(/[^0-9.]/g,'')).toLocaleString()}${topMet.unit&&topMet.unit!=='$'&&topMet.unit!=='\u20ac'?topMet.unit:''}</span>
      </div>
    </div>`:``}

    <!-- Metric cards -->
    ${metrics.map(m=>{
      const st=calcMetricStatusV18(m);
      const stCol={green:'#40CC8F',amber:'#EF9637',red:'#FD576B',grey:'#94a3b8'}[st]||'#94a3b8';
      const stLabel={green:'On Track',amber:'At Risk',red:'Off Track',grey:'No Data'}[st]||'No Data';
      const isQual=m.type==='qualitative';
      const cur=isQual?(m.currentValue||'\u2014'):parseFloat(String(m.currentValue||0).replace(/[^0-9.]/g,''));
      const tgt=isQual?(m.target||'\u2014'):parseFloat(String(m.target||1).replace(/[^0-9.]/g,''));
      const pct=!isQual&&tgt>0?Math.min(100,Math.round(cur/tgt*100)):0;
      const fmtVal=(v,unit)=>(unit==='$'||unit==='\u20ac'?unit:'')+parseFloat(String(v||0).replace(/[^0-9.]/g,'')).toLocaleString()+(unit&&unit!=='$'&&unit!=='\u20ac'?unit:'');

      // Value log entries (from linkedEntries that have impactDirection 'up' or manual notes with value)
      const valueLogs=(m.linkedEntries||[]).filter(e=>!e.dismissed).slice(0,3);

      return`<div class="card" style="margin-bottom:10px;border-left:3px solid ${stCol}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:10px;height:10px;border-radius:50%;background:${stCol};flex-shrink:0"></div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700">${m.metric}</div>
            <div style="font-size:10px;color:var(--t3)">${isQual?'Qualitative':'Quantitative \u00b7 '+m.unit} \u00b7 <span style="color:${stCol};font-weight:600">${stLabel}</span></div>
          </div>
          ${!isQual?`<div style="text-align:right">
            <div style="font-size:20px;font-weight:800;color:${stCol}">${fmtVal(m.currentValue,m.unit)}</div>
            <div style="font-size:10px;color:var(--t3)">of ${fmtVal(m.target,m.unit)} target</div>
          </div>`:
          `<div style="text-align:right">
            <div style="font-size:16px;font-weight:700;color:${stCol}">${m.currentValue||'\u2014'}</div>
            <div style="font-size:10px;color:var(--t3)">Target: ${m.target||'\u2014'}</div>
          </div>`}
        </div>

        ${!isQual?`<div style="margin-bottom:10px"><div class="acv-bg" style="height:6px"><div class="acv-fill" style="width:${pct}%;background:${stCol};height:6px"></div></div></div>`:``}

        <!-- Recent value updates -->
        ${valueLogs.length>0?`<div style="border-top:1px solid #f0f4fb;padding-top:8px">
          ${valueLogs.map(e=>`<div style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:11px">
            <span style="color:${e.impactDirection==='up'?'#40CC8F':e.impactDirection==='down'?'#FD576B':'#94a3b8'};font-weight:700;flex-shrink:0">${e.impactDirection==='up'?'\u2191':e.impactDirection==='down'?'\u2193':'\u2022'}</span>
            <span style="color:#64748b;flex:1">${(e.impactNote||'').slice(0,120)}${(e.impactNote||'').length>120?'\u2026':''}</span>
            <span style="color:#94a3b8;font-size:9px;flex-shrink:0">${fd(e.linkedAt)}</span>
          </div>`).join('')}
        </div>`:``}

        <!-- Log value button -->
        ${canCS?`<div style="margin-top:8px;display:flex;gap:6px;align-items:center">
          ${S.logValueMetricId===m.id?`
            <input class="inp" style="flex:1;margin:0;padding:4px 8px;font-size:11px" placeholder="${isQual?'High / Medium / Low':'Value amount'}" id="vlog-val-${m.id}">
            <input class="inp" style="flex:2;margin:0;padding:4px 8px;font-size:11px" placeholder="Source / evidence" id="vlog-src-${m.id}">
            <button class="btn bp btn-sm" onclick="logMetricValue('${a.id}','${m.id}')">Save</button>
            <button class="btn bg btn-sm" onclick="set({logValueMetricId:null})">Cancel</button>
          `:`<button class="btn bs btn-sm" onclick="set({logValueMetricId:'${m.id}'})">\u2191 Log value</button>
            <span style="font-size:9px;color:#94a3b8">Last updated: ${m.lastUpdated?fd(m.lastUpdated):'Never'}${m.lastUpdatedBy?' by '+m.lastUpdatedBy:''}</span>`}
        </div>`:``}
      </div>`;
    }).join('')}

    ${canCS?`<button class="btn bs" onclick="addMetric('${a.id}')" style="margin-top:6px">+ Add a metric</button>`:''}
  </div>`;
}

// v19.1: Contract & Goals — single merged view
function bContractAndGoals(a){
  const n=a.notes||{};
  if(!n.successContract)n.successContract={};
  // P0-3: Auto-draft success contract from Sales handoff data on first CSM entry
  if(!n.successContract.metric1&&n.gate_signed){
    const shm=n.sh_successMetrics||n.mt_metrics||[];
    if(shm.length>0){
      const primary=shm[0];
      n.successContract.metric1=primary.metric||'';
      n.successContract.metric1Unit=primary.unit||'$';
      if(shm.length>1)n.successContract.metric2=shm[1].metric||'';
      // Extract measurement method from handoff context
      const owner=n.sh_stakeholderSignoff?n.sh_stakeholderSignoff.split(',')[0].trim():'';
      n.successContract.measureSource='Validated by '+(owner||'procurement team')+' using Beroe data vs actuals';
      n.successContract.measureFreq='Quarterly';
      n.successContract.measureOwner=owner;
    }
    if(n.sol_valueDefinition){
      n.successContract.valueNarrative=n.sol_valueDefinition.length>200?n.sol_valueDefinition.slice(0,200):n.sol_valueDefinition;
    }
    // Auto-seed goals from success metrics if none exist
    if(!n.csGoals||n.csGoals.length===0){
      n.csGoals=[];
      const metricNames=(shm||[]).map(m=>(m.metric||'').toLowerCase()).join(' ');
      if(metricNames.includes('sav')||metricNames.includes('cost')||metricNames.includes('negotiat'))n.csGoals.push({type:'savings',targetValue:shm.find(m=>(m.metric||'').toLowerCase().match(/sav|cost/))?.target||'',targetDate:n.gate_renewalDate||'',owner:n.successContract.measureOwner||'',locked:false,initiatives:[]});
      if(metricNames.includes('vendor')||metricNames.includes('supplier')||metricNames.includes('consolidat')||metricNames.includes('risk'))n.csGoals.push({type:'vendor',targetValue:'',targetDate:n.gate_renewalDate||'',owner:'',locked:false,initiatives:[]});
      if(metricNames.includes('adopt')||metricNames.includes('usage')||metricNames.includes('engagement'))n.csGoals.push({type:'adoption',targetValue:shm.find(m=>(m.metric||'').toLowerCase().match(/adopt|usage/))?.target||'',targetDate:n.gate_renewalDate||'',owner:'',locked:false,initiatives:[]});
    }
  }
  if(!n.csGoals)n.csGoals=[];
  const sc=n.successContract;
  const goals=n.csGoals;
  const canCS=canEditSection("CS");
  const scLocked=!!sc.lockedDate;
  const lock1Done=sc.metric1&&sc.metric1Unit;
  const lock2Done=sc.measureSource&&sc.measureFreq;
  const lock3Done=sc.valueNarrative&&sc.valueNarrative.length>10;
  const allLocked=lock1Done&&lock2Done&&lock3Done;
  // Stakeholder names for auto-suggest
  const stkNames=Object.values(n.csStakeholders||{}).map(s=>s.name).filter(Boolean);
  const stkOpts=stkNames.length>0?stkNames.map(nm=>`<option value="${nm}">`).join(''):'';
  const stkListId='stk-suggest-'+a.id;

  const GOAL_CATS={
    cost_savings:{label:"Cost Savings",icon:"\ud83d\udcb0",col:"#40CC8F"},
    base_rationalization:{label:"Supply Base Rationalisation",icon:"\ud83d\udd17",col:"#4A00F8"},
    risk_mitigation:{label:"Risk Mitigation",icon:"\ud83d\udee1\ufe0f",col:"#EF9637"},
    adoption:{label:"Adoption & Utilisation",icon:"\ud83d\udcca",col:"#C344C7"},
    other:{label:"Other",icon:"\ud83c\udfaf",col:"#64748b"}
  };
  // Backward compat: map old type-based goals to new model on read
  goals.forEach(g=>{
    if(g.type&&!g.id)g.id='g_'+g.type;
    if(g.type&&!g.category){
      if(g.type==='savings'){g.category='cost_savings';g.title=g.title||'Cost Savings';}
      else if(g.type==='vendor'){g.category='base_rationalization';g.title=g.title||'Vendor Consolidation';}
      else if(g.type==='sustainability'){g.category='other';g.title=g.title||'Improve Sustainability';}
      else if(g.type==='adoption'){g.category='adoption';g.title=g.title||'Platform Adoption';}
      else{g.category='other';g.title=g.title||g.type;}
    }
    if(!g.id)g.id='g_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    if(!g.category)g.category='other';
    if(!g.title)g.title='Untitled Goal';
  });

  const isDraft=sc.metric1&&!sc.lockedDate;
  const hTag=isDraft?'<span style="font-size:9px;color:#d88520;background:#FAEEDA;padding:1px 5px;border-radius:4px;font-weight:700;margin-left:4px">\ud83d\udccb from handoff</span>':'';

  return`<div>
  ${stkOpts?`<datalist id="${stkListId}">${stkOpts}</datalist>`:''}
  ${isDraft?`<div style="background:#fff8eb;border:1.5px solid #EF963740;border-radius:var(--rr2);padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
    <span style="font-size:14px">\ud83d\udccb</span>
    <span style="font-size:12px;font-weight:600;color:#d88520">Draft pre-filled from Sales handoff \u2014 review and lock to activate this account.</span>
  </div>`:``}
  <!-- ── Success Contract ── -->
  ${scLocked?`
    <div style="background:#f0fdf4;border:1.5px solid #40CC8F40;border-radius:var(--rr2);padding:14px 18px;margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">\ud83d\udd12</span><span style="font-size:14px;font-weight:700;color:#2fb87a">Success Contract Locked</span><span style="font-size:10px;color:var(--t3)">${fd(sc.lockedDate)} by ${sc.lockedBy||'CS'}</span></div>
        ${canCS?`<button class="btn bg btn-sm" onclick="unlockSContract('${a.id}')">Unlock</button>`:''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div style="background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e8eef8">
          <div style="font-size:9px;font-weight:700;color:#40CC8F;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Metric</div>
          <div style="font-size:12px;font-weight:600">${sc.metric1||'\u2014'} (${sc.metric1Unit||''})</div>
          ${sc.metric2?`<div style="font-size:11px;color:var(--t3);margin-top:2px">${sc.metric2}</div>`:''}
        </div>
        <div style="background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e8eef8">
          <div style="font-size:9px;font-weight:700;color:#40CC8F;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Measurement</div>
          <div style="font-size:12px">${sc.measureSource||'\u2014'}</div>
          <div style="font-size:10px;color:var(--t3)">${sc.measureFreq||''} \u00b7 ${sc.measureOwner||''}</div>
        </div>
        <div style="background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e8eef8">
          <div style="font-size:9px;font-weight:700;color:#40CC8F;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Value Narrative</div>
          <div style="font-size:11px;color:#7a3800;font-style:italic;line-height:1.5">"${(sc.valueNarrative||'').slice(0,120)}${(sc.valueNarrative||'').length>120?'\u2026':''}"</div>
        </div>
      </div>
    </div>
  `:`
    <div class="card" style="margin-bottom:14px;border:2px dashed #EF963740">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">\ud83d\udd12 Define Success Contract</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div style="border-right:1px solid var(--cb);padding-right:12px">
          <div style="font-size:11px;font-weight:700;color:#EF9637;margin-bottom:8px">Lock 1 \u2014 Success Metric ${lock1Done?'\u2713':''}${sc.metric1?hTag:''}</div>
          ${canCS?`<input class="inp" value="${(sc.metric1||'').replace(/"/g,'&quot;')}" placeholder="e.g. $2M savings delivered" oninput="updSC('${a.id}','metric1',this.value)">
          <select class="inp" onchange="updSC('${a.id}','metric1Unit',this.value)"><option value="">Unit --</option>${["$","%","MAU","#","hours","score"].map(u=>`<option ${sc.metric1Unit===u?'selected':''}>${u}</option>`).join('')}</select>
          <input class="inp" value="${(sc.metric2||'').replace(/"/g,'&quot;')}" placeholder="Secondary metric (optional)" oninput="updSC('${a.id}','metric2',this.value)">`
          :`<div style="font-size:12px;color:var(--t3)">${sc.metric1||'Not set'}</div>`}
        </div>
        <div style="border-right:1px solid var(--cb);padding-right:12px">
          <div style="font-size:11px;font-weight:700;color:#EF9637;margin-bottom:8px">Lock 2 \u2014 Measurement ${lock2Done?'\u2713':''}${sc.measureSource?hTag:''}</div>
          ${canCS?`<input class="inp" value="${(sc.measureSource||'').replace(/"/g,'&quot;')}" placeholder="Data source" oninput="updSC('${a.id}','measureSource',this.value)">
          <select class="inp" onchange="updSC('${a.id}','measureFreq',this.value)"><option value="">Frequency --</option>${["Monthly","Quarterly","Bi-annual","Annual"].map(f=>`<option ${sc.measureFreq===f?'selected':''}>${f}</option>`).join('')}</select>
          <input class="inp" list="${stkListId}" value="${(sc.measureOwner||'').replace(/"/g,'&quot;')}" placeholder="Owner (stakeholder)" oninput="updSC('${a.id}','measureOwner',this.value)">`
          :`<div style="font-size:12px;color:var(--t3)">${sc.measureSource||'Not set'}</div>`}
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#EF9637;margin-bottom:8px">Lock 3 \u2014 Value Narrative ${lock3Done?'\u2713':''}${sc.valueNarrative?hTag:''}</div>
          ${canCS?`<textarea class="ta" rows="4" style="background:#fff8eb;border-color:#EF963740" placeholder="We help you achieve [X] by doing [Y], resulting in [Z]" oninput="updSC('${a.id}','valueNarrative',this.value)">${sc.valueNarrative||''}</textarea>`
          :`<div style="font-size:12px;color:var(--t3)">${sc.valueNarrative||'Not set'}</div>`}
        </div>
      </div>
      ${canCS?`<div style="margin-top:12px;text-align:center">
        <button class="btn bp" style="padding:10px 28px" onclick="lockSContract('${a.id}')" ${allLocked?'':'disabled style="padding:10px 28px;opacity:0.5;cursor:not-allowed"'}>\ud83d\udd12 Lock Success Contract</button>
        ${!allLocked?'<div style="font-size:10px;color:var(--t3);margin-top:4px">Complete all 3 locks</div>':''}
        ${S.scQualityWarning?`<div class="ins amber" style="margin-top:8px">\ud83d\udca1 Your primary metric doesn\u2019t have a number in it \u2014 metrics without quantified targets are hard to defend at renewal. Consider adding a specific figure (e.g. "$2.4M in documented savings" not "Improve cost savings"). You can still lock now and edit later.
        <button style="background:none;border:none;font-size:10px;color:#4A00F8;cursor:pointer" onclick="sendAIMessage('My success contract metric is: ${(sc.metric1||'').replace(/'/g,"\\'")}. Is this specific enough to be defensible at renewal? If not, suggest a better version for ${a.name} in ${a.industry}.');set({aiPanelOpen:true})">\ud83d\udca1 Ask Claude to improve it</button></div>`:''}
      </div>`:``}
    </div>
  `}

  <!-- ── Goals & Initiatives ── -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:14px;font-weight:700">Goals & Initiatives</div>
    ${canCS?`<button class="btn bs btn-sm" onclick="addGoalFreeform('${a.id}')">+ Add Goal</button>`:''}
  </div>

  ${goals.length===0?`<div style="background:#f8f9fc;border:1px dashed var(--cb);border-radius:var(--rr);padding:16px;text-align:center;color:var(--t3);font-size:12px;margin-bottom:14px">No goals defined yet. ${n.sh_successMetrics&&n.sh_successMetrics.length>0?'Goals will auto-seed from handoff metrics on first entry.':'Add the first goal to start tracking value.'}</div>`:``}

  <!-- Goal cards -->
  ${goals.map(g=>{
    const gc=GOAL_CATS[g.category]||GOAL_CATS.other;
    const inits=g.initiatives||[];
    const initCount=inits.length;
    const doneCount=inits.filter(i=>i.status==='delivered').length;
    return`<div class="card" style="margin-bottom:10px;border-left:3px solid ${gc.col}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:14px">${gc.icon}</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px">
            ${canCS?`<input class="inp" style="margin:0;padding:3px 8px;font-size:13px;font-weight:700;flex:1;border:none;background:transparent" value="${(g.title||'').replace(/"/g,'&quot;')}" oninput="updGoalById('${a.id}','${g.id}','title',this.value)">`:`<span style="font-size:13px;font-weight:700">${g.title||'Untitled'}</span>`}
            <span style="font-size:9px;background:${gc.col}15;color:${gc.col};padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap">${gc.label}</span>
          </div>
          ${canCS?`<div style="font-size:9px;color:#94a3b8;margin-top:1px;margin-left:8px">This should match what was agreed in the Sales handoff</div>`:``}
        </div>
        ${canCS?`<select class="inp" style="margin:0;width:140px;padding:2px 4px;font-size:10px" onchange="updGoalById('${a.id}','${g.id}','category',this.value)">
          ${Object.entries(GOAL_CATS).map(([k,v])=>`<option value="${k}" ${g.category===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
        </select>`:''}
        ${canCS?`<button class="del-btn" onclick="removeGoalById('${a.id}','${g.id}')" style="padding:2px 5px">\u2716</button>`:''}
      </div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        ${canCS?`<input class="inp" style="margin:0;padding:3px 6px;font-size:10px;flex:1" value="${(g.targetValue||'').replace(/"/g,'&quot;')}" placeholder="Target (e.g. $1M, 40 suppliers \u2192 25, 80% MAU)" oninput="updGoalById('${a.id}','${g.id}','targetValue',this.value)">`:`<span style="font-size:11px;font-weight:600">${g.targetValue||'\u2014'}</span>`}
        ${canCS?`<input class="inp" type="date" style="margin:0;padding:3px 6px;font-size:10px;width:120px" value="${g.targetDate||''}" oninput="updGoalById('${a.id}','${g.id}','targetDate',this.value)">`:''}
        ${canCS?`<input class="inp" style="margin:0;padding:3px 6px;font-size:10px;width:100px" list="${stkListId}" value="${(g.owner||'').replace(/"/g,'&quot;')}" placeholder="Owner" oninput="updGoalById('${a.id}','${g.id}','owner',this.value)">`:`<span style="font-size:10px;color:var(--t3)">${g.owner||''}</span>`}
      </div>
      <!-- Initiatives (category-aware stages) -->
      <div style="border-top:1px solid #f0f4fb;padding-top:6px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em">${initCount} initiatives \u00b7 ${doneCount} delivered</span>
          ${(()=>{const aSt=g.alignmentStatus||(g.initiatives&&g.initiatives.length>0?'partial':'not_started');
          if(!canCS)return'';
          if(aSt==='not_started'&&!(g.initiatives&&g.initiatives.length>0))return`<span style="font-size:9px;color:#EF9637">\u26a0\ufe0f Complete Goal Alignment first</span>`;
          if(aSt==='partial')return`<button class="btn bg btn-sm" style="font-size:9px;padding:2px 8px;border-color:#EF963740;color:#EF9637" title="Alignment in progress" onclick="addInitiativeById('${a.id}','${g.id}')">+ Initiative</button>`;
          return`<button class="btn bg btn-sm" style="font-size:9px;padding:2px 8px" onclick="addInitiativeById('${a.id}','${g.id}')">+ Initiative</button>`;})()}
        </div>
        ${(()=>{const iStg=getInitStages(g.category||'other');const allStages=[...iStg.stages,...iStg.extra];
        return inits.map((init,ii)=>{
          const vs=init.valueStage||iStg.stages[0];
          const vsIdx=iStg.stages.indexOf(vs);
          const isDeferred=vs==='deferred'||vs==='not_pursued';
          const vsCol=iStg.cols[vs]||'#94a3b8';
          const vsLabel=iStg.labels[vs]||vs;
          const histId='ih_'+g.id+'_'+ii;
          return`<div style="background:#f8f9fc;border:1px solid #e8eef8;border-radius:8px;padding:10px 12px;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <div style="flex:1;font-size:12px;font-weight:600">${init.name}${init.subInitiatives?'<span style="font-weight:400;color:var(--t3);font-size:10px"> \u2014 '+init.subInitiatives+'</span>':''}</div>
              ${(init.clientData||[]).length>0?`<span style="font-size:8px;padding:1px 5px;border-radius:8px;background:${init.clientData.every(cd=>cd.status==='received')?'#d4f5e5':'#fef0c0'};color:${init.clientData.every(cd=>cd.status==='received')?'#146a45':'#8a4510'};font-weight:600">${init.clientData.filter(cd=>cd.status==='received').length}/${init.clientData.length}</span>`:''}
              ${canCS?`<button class="del-btn" onclick="delInitById('${a.id}','${g.id}',${ii})" style="padding:1px 4px;font-size:9px">\u2716</button>`:''}
            </div>
            <!-- Stage progress dots -->
            <div style="display:flex;align-items:center;gap:0;margin-bottom:8px">
              ${iStg.stages.map((st,si)=>{const filled=si<=vsIdx&&!isDeferred;return(si>0?`<div style="flex:1;height:2px;background:${filled?iStg.cols[st]||'#40CC8F':'#e8eef8'}"></div>`:'')+`<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div style="width:10px;height:10px;border-radius:50%;background:${filled?iStg.cols[st]||'#40CC8F':'#e8eef8'};border:1.5px solid ${filled?iStg.cols[st]||'#40CC8F':'#cbd5e1'}"></div><div style="font-size:7px;font-weight:600;color:${filled?iStg.cols[st]||'#40CC8F':'#94a3b8'}">${iStg.labels[st]||st}</div></div>`;}).join('')}
            </div>
            <!-- Stage selector + value fields -->
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              ${canCS?`<select class="inp" style="margin:0;width:130px;padding:2px 4px;font-size:9px;border-color:${vsCol}" onchange="updateInitStage('${a.id}','${g.id}',${ii},this.value)">
                ${allStages.map(st=>`<option value="${st}" ${vs===st?'selected':''}>${iStg.labels[st]||st}</option>`).join('')}
              </select>`:`<span style="font-size:10px;font-weight:600;color:${vsCol}">${vsLabel}</span>`}
              ${canCS&&vs==='committed'?`<div style="font-size:9px;color:#d88520;margin-top:3px;padding:3px 6px;background:#fff8eb;border-radius:4px;width:100%">\u2713 Committed = client has explicitly agreed to pursue this. Make sure you have a call note or email confirming.</div>`:canCS&&vs==='implemented'?`<div style="font-size:9px;color:#2fb87a;margin-top:3px;padding:3px 6px;background:#f0fdf4;border-radius:4px;width:100%">\u2713 Implemented = client executed. Log a confirmation (PO, contract, or email) in the activity feed.</div>`:canCS&&(vs==='deferred'||vs==='not_pursued')?`<div style="font-size:9px;color:#4A00F8;margin-top:3px;padding:3px 6px;background:#f3f0ff;border-radius:4px;width:100%">\ud83d\udccb This will show as a client decision in the VDD \u2014 not a Beroe delivery gap. Document the reason above.</div>`:''}
              ${g.category==='cost_savings'?`
                ${canCS?`<input class="inp" style="margin:0;padding:2px 5px;font-size:9px;width:80px" placeholder="Identified $" value="${init.identifiedValue||''}" oninput="updInitById('${a.id}','${g.id}',${ii},'identifiedValue',this.value)">`:''}
                ${vs==='committed'||vs==='implemented'?canCS?`<input class="inp" style="margin:0;padding:2px 5px;font-size:9px;width:80px" placeholder="Committed $" value="${init.committedValue||''}" oninput="updInitById('${a.id}','${g.id}',${ii},'committedValue',this.value)">`:'':''}
                ${vs==='implemented'?canCS?`<input class="inp" style="margin:0;padding:2px 5px;font-size:9px;width:80px" placeholder="Implemented $" value="${init.implementedValue||''}" oninput="updInitById('${a.id}','${g.id}',${ii},'implementedValue',this.value)">`:'':''}
              `:g.category==='base_rationalization'?`
                ${canCS?`<input class="inp" style="margin:0;padding:2px 5px;font-size:9px;width:70px" placeholder="Baseline" value="${init.baselineValue||''}" oninput="updInitById('${a.id}','${g.id}',${ii},'baselineValue',this.value)"> <span style="font-size:9px;color:var(--t3)">\u2192</span> <input class="inp" style="margin:0;padding:2px 5px;font-size:9px;width:70px" placeholder="Current" value="${init.currentCount||''}" oninput="updInitById('${a.id}','${g.id}',${ii},'currentCount',this.value)">`
                :`<span style="font-size:10px">${init.baselineValue||'?'} \u2192 ${init.currentCount||'?'}</span>`}
              `:''}
              <!-- Client acknowledged -->
              ${canCS?`<select class="inp" style="margin:0;width:90px;padding:2px 3px;font-size:8px;margin-left:auto" onchange="updInitById('${a.id}','${g.id}',${ii},'clientAcknowledged',this.value)">
                <option value="pending" ${(init.clientAcknowledged||'pending')==='pending'?'selected':''}>Pending</option>
                <option value="yes" ${init.clientAcknowledged==='yes'?'selected':''}>Acknowledged</option>
                <option value="not_yet" ${init.clientAcknowledged==='not_yet'?'selected':''}>Not Yet</option>
              </select>`:`<span style="font-size:9px;color:${init.clientAcknowledged==='yes'?'#40CC8F':'#94a3b8'};margin-left:auto">${init.clientAcknowledged==='yes'?'\u2705 Ack':'\u23f3'}</span>`}
            </div>
            ${isDeferred?`<div style="background:#FAEEDA;border:1px solid #FAC77540;border-radius:6px;padding:6px 10px;margin-top:6px;font-size:10px;color:#854F0B">
              <b>\ud83d\udccb Client decision \u2014 not a delivery gap</b><br>
              ${canCS?`<input class="inp" style="margin:4px 0 0;padding:3px 6px;font-size:10px;background:#fff" placeholder="Reason (e.g. budget freeze, deprioritised)" value="${(init.implementationNote||'').replace(/"/g,'&quot;')}" oninput="updInitById('${a.id}','${g.id}',${ii},'implementationNote',this.value)">`:`${init.implementationNote||'No reason provided'}`}
            </div>`:``}
            ${(init.valueHistory||[]).length>0?`<div style="margin-top:6px"><button style="background:none;border:none;font-size:9px;color:#4A00F8;cursor:pointer;font-weight:600" onclick="var el=document.getElementById('${histId}');el.style.display=el.style.display==='none'?'block':'none'">Show history (${init.valueHistory.length})</button>
              <div id="${histId}" style="display:none;margin-top:4px;padding:4px 8px;background:#faf9ff;border-radius:4px">${(init.valueHistory||[]).map(vh=>`<div style="font-size:9px;color:#64748b;padding:2px 0">${fd(vh.date)} \u00b7 ${vh.from} \u2192 ${vh.to} \u00b7 ${vh.changedBy||''}</div>`).join('')}</div>
            </div>`:``}
          </div>`;
        }).join('');})()}
      </div>
    </div>`;
  }).join('')}
  </div>`;
}

// v19: VDD Pane (replaces BVD in Account Kit)
function bVDDPane(a){
  const n=a.notes||{};
  const sc=n.successContract||{};
  const goals=n.csGoals||[];
  const metrics=n.metrics||[];
  const canCS=canEditSection("CS");
  if(!n.vdd)n.vdd={sections:[
    {title:"Client Strategic Priorities",content:"",lastUpdated:null},
    {title:"Agreed Success Metrics",content:"",lastUpdated:null},
    {title:"Beroe\u2019s Approach Per Initiative",content:"",lastUpdated:null},
    {title:"Value Delivered \u2014 CSM Attributed",content:"",lastUpdated:null}
  ],updateHistory:[]};
  const vdd=n.vdd;
  const SAVINGS_LEVERS=[
    {lever:"Lever 1",desc:"Price intelligence & forecasting",range:"3\u20134% savings"},
    {lever:"Lever 2",desc:"Negotiation via cost structure analysis",range:"3\u20135% savings"},
    {lever:"Lever 3",desc:"Category strategy & risk mitigation",range:"~1% savings"},
    {lever:"Combined",desc:"On managed spend pool",range:"7\u201310% savings"}
  ];
  // Change 5: If no success contract but account is signed, show utilization summary
  if(!sc.lockedDate&&n.gate_signed){
    const adoptPct=a.a3&&a.lu?Math.round(a.a3/a.lu*100):0;
    const cats=(a.catIntel?.topCats||[]);
    const activeCats=cats.filter(c=>c.visits>0);
    const coldCats=cats.filter(c=>c.visits===0);
    const mods=a.contractModules||[];
    const posSigs=(a.softSignals||[]).filter(s=>!s.hidden&&s.status==='active'&&(s.type==='positive'||s.type==='expansion'));
    const resActs=(a.activityFeed||[]).filter(x=>!x.hidden&&(x.type==='research'||x.type==='csm_call')&&x.items&&x.items.length>0);
    const quotes=(a.vocData||[]).filter(v=>v.sentiment==='positive');
    return`<div>
    <div class="card" style="margin-bottom:12px;border-left:4px solid #EF9637">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px">\ud83d\udcca Platform Utilisation Summary</div>
      <div class="ins amber" style="margin-bottom:14px">No success contract yet \u2014 showing platform utilisation summary. Use this to identify where value is and isn\u2019t being captured, then formalise the success contract.</div>

      <!-- Bucket 1: Coverage -->
      <div style="font-size:11px;font-weight:700;color:#EF9637;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Coverage</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
        <div style="background:#f8f9fc;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:${adoptPct>=60?'#40CC8F':'#EF9637'}">${adoptPct}%</div>
          <div style="font-size:9px;color:var(--t3)">User Adoption (${a.a3||0}/${a.lu||0})</div>
        </div>
        <div style="background:#f8f9fc;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:#4A00F8">${activeCats.length}/${cats.length}</div>
          <div style="font-size:9px;color:var(--t3)">Active Categories</div>
        </div>
        <div style="background:#f8f9fc;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:#35E1D4">${mods.length}</div>
          <div style="font-size:9px;color:var(--t3)">Modules Contracted</div>
        </div>
      </div>
      ${mods.length>0?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${mods.map(m=>`<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:#f3f0ff;color:#4A00F8;border:1px solid #e0deff;font-weight:600">${m}</span>`).join('')}</div>`:''}
      ${coldCats.length>0?`<div style="font-size:10px;color:#EF9637;margin-bottom:8px">\u26a0\ufe0f Dormant categories: ${coldCats.map(c=>c.name).join(', ')}</div>`:''}

      <!-- Bucket 2: Activity -->
      <div style="font-size:11px;font-weight:700;color:#4A00F8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:14px">Activity</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
        <div style="background:#f8f9fc;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:800">${a.l3||0}</div>
          <div style="font-size:9px;color:var(--t3)">Sessions (90d)</div>
        </div>
        <div style="background:#f8f9fc;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:800">${a.ab3||0}</div>
          <div style="font-size:9px;color:var(--t3)">Abi Queries (90d)</div>
        </div>
        <div style="background:#f8f9fc;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:800">${a.h3||0}</div>
          <div style="font-size:9px;color:var(--t3)">Hours on Platform (90d)</div>
        </div>
      </div>
      ${(n.healthHistory||[]).length>1?`<div style="font-size:10px;color:var(--t3);margin-bottom:8px">Health trend: ${n.healthHistory.map(h=>'<span style="font-weight:600">'+h.health+'</span>').join(' \u2192 ')}</div>`:''}

      <!-- Bucket 3: Intelligence Impact -->
      <div style="font-size:11px;font-weight:700;color:#40CC8F;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;margin-top:14px">Intelligence Impact</div>
      ${posSigs.length>0||resActs.length>0||quotes.length>0?`
        ${posSigs.length>0?`<div style="margin-bottom:8px"><span style="font-size:10px;font-weight:600;color:#40CC8F">${posSigs.length} positive signals</span>${posSigs.slice(0,2).map(s=>`<div style="font-size:11px;color:#64748b;padding:2px 0 2px 12px;position:relative"><span style="position:absolute;left:0;color:#40CC8F;font-size:9px">\u2192</span>${s.signal}</div>`).join('')}</div>`:''}
        ${resActs.length>0?`<div style="margin-bottom:8px"><span style="font-size:10px;font-weight:600">Recent research deliveries:</span>${resActs.slice(0,2).map(ra=>`<div style="font-size:11px;color:#64748b;padding:2px 0 2px 12px;position:relative"><span style="position:absolute;left:0;color:#4A00F8;font-size:9px">\u2192</span>${ra.title}</div>`).join('')}</div>`:''}
        ${quotes.length>0?`<div style="margin-bottom:8px">${quotes.slice(0,2).map(q=>`<div style="font-size:11px;color:#7a3800;background:#fff8eb;border-radius:4px;padding:4px 8px;margin-bottom:4px;font-style:italic">"${q.quote}" \u2014 ${q.author}</div>`).join('')}</div>`:''}
      `:`<div style="font-size:11px;color:var(--t3);font-style:italic">No impact evidence yet \u2014 log client feedback in the Activity Feed to build this section.</div>`}

      <div style="margin-top:14px;text-align:center">
        <button class="btn bp btn-sm" onclick="set({tab:'metrics',smSubTab:'contract'})">\u2192 Define Success Contract to formalise value tracking</button>
      </div>
    </div>
    </div>`;
  }

  return`<div>
    <div class="card" style="margin-bottom:12px;border-left:4px solid #35E1D4">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px">\ud83d\udcc4 Value Delivery Document (VDD)</div>
      <div class="ins" style="margin-bottom:12px">The VDD is the single source of truth for what Beroe committed to and what was delivered. It is reviewed at every checkpoint and is the primary input to the renewal conversation.</div>

      <!-- Value Narrative from Success Contract -->
      ${sc.valueNarrative?`<div style="background:#fff8eb;border:1.5px solid #EF963740;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-style:italic;color:#7a3800;font-size:12px;line-height:1.6">"\u2b50 ${sc.valueNarrative}"</div>`:''}

      <!-- VDD Sections -->
      ${vdd.sections.map((sec,i)=>{
        // Section 4 (idx 3): inject cost savings rollup above textarea
        let rollup='';
        if(i===3){
          const csGoals=(n.csGoals||[]).filter(g=>g.category==='cost_savings');
          if(csGoals.length>0){
            let idSum=0,cmSum=0,imSum=0;const deferred=[];const notPursued=[];
            csGoals.forEach(g=>(g.initiatives||[]).forEach(init=>{
              const iv=parseFloat(init.identifiedValue||0);
              idSum+=iv;
              const vs=init.valueStage||'';
              if(['committed','implemented','deferred','not_pursued'].includes(vs))cmSum+=parseFloat(init.committedValue||init.identifiedValue||0);
              if(vs==='implemented')imSum+=parseFloat(init.implementedValue||init.committedValue||init.identifiedValue||0);
              if(vs==='deferred')deferred.push({name:init.name,note:init.implementationNote||'No reason provided',val:iv});
              if(vs==='not_pursued')notPursued.push({name:init.name,note:init.implementationNote||'No reason provided',val:iv});
            }));
            if(idSum>0){
              rollup=`<div style="background:#f0fdf4;border:1.5px solid #40CC8F40;border-radius:8px;padding:12px 14px;margin-bottom:10px">
                <div style="font-size:10px;font-weight:700;color:#40CC8F;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">CSM Attribution Summary \u2014 from initiative stage tracking</div>
                <div style="display:flex;gap:16px;margin-bottom:6px">
                  <div style="text-align:center"><div style="font-size:16px;font-weight:800;color:#EF9637">$${idSum.toLocaleString()}</div><div style="font-size:9px;color:var(--t3)">Identified</div></div>
                  <div style="text-align:center"><div style="font-size:16px;font-weight:800;color:#4A00F8">$${cmSum.toLocaleString()}</div><div style="font-size:9px;color:var(--t3)">Committed</div></div>
                  <div style="text-align:center"><div style="font-size:16px;font-weight:800;color:#40CC8F">$${imSum.toLocaleString()}</div><div style="font-size:9px;color:var(--t3)">Implemented</div></div>
                </div>
                ${deferred.length>0?deferred.map(d=>`<div style="font-size:10px;color:#854F0B;background:#FAEEDA;border-radius:4px;padding:4px 8px;margin-bottom:3px">\ud83d\udccb Deferred: ${d.name} ($${d.val.toLocaleString()}) \u2014 ${d.note}</div>`).join(''):''}
                ${notPursued.length>0?notPursued.map(d=>`<div style="font-size:10px;color:#c42040;background:#fff0f2;border-radius:4px;padding:4px 8px;margin-bottom:3px">\u274c Not pursued: ${d.name} ($${d.val.toLocaleString()}) \u2014 ${d.note}</div>`).join(''):''}
              </div>`;
            }
          }
        }
        return`<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:#35E1D4;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${sec.title}</div>
        ${rollup}
        ${canCS?`<textarea class="ta" rows="4" placeholder="Describe ${sec.title.toLowerCase()}..." oninput="updVDD('${a.id}',${i},this.value)">${sec.content||''}</textarea>`:`<div style="font-size:12px;padding:8px 10px;background:#f8f9fc;border:1.5px solid var(--cb);border-radius:7px;line-height:1.6">${sec.content||'\u2014'}</div>`}
      </div>`;}).join('')}

      <!-- Savings Lever Framework -->
      <div style="font-size:11px;font-weight:700;color:#35E1D4;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;margin-top:16px">Savings Lever Framework</div>
      <table class="dt"><thead><tr><th>Lever</th><th>Description</th><th>Typical Range</th></tr></thead><tbody>
        ${SAVINGS_LEVERS.map(l=>`<tr style="${l.lever==='Combined'?'font-weight:700;background:#f0fdf4':''}"><td>${l.lever}</td><td>${l.desc}</td><td>${l.range}</td></tr>`).join('')}
      </tbody></table>

      <!-- Actions -->
      <div style="display:flex;gap:8px;margin-top:14px">
        ${canCS?`<button class="btn bp" onclick="draftVDDWithAI('${a.id}')">\u2728 Draft VDD with AI</button>`:''}
        <button class="btn bs" onclick="downloadBVD('${a.id}')">Download PPT</button>
      </div>

      <!-- Update History -->
      ${vdd.updateHistory&&vdd.updateHistory.length>0?`<div style="margin-top:12px;border-top:1px solid var(--cb);padding-top:10px">
        <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px">Update History</div>
        ${vdd.updateHistory.slice(0,5).map(u=>`<div style="font-size:10px;color:var(--t3);padding:3px 0">${fd(u.date)} \u00b7 ${u.updatedBy} \u00b7 ${u.summary}</div>`).join('')}
      </div>`:''}
    </div>
  </div>`;
}

// v19: Renewal Readiness (3 questions)
function bRenewalReadiness(a){
  const n=a.notes||{};

// v19.1: Delivery & Renewal — merged Dual Track + VDD + Renewal Readiness
function bDeliveryRenewal(a){
  const n=a.notes||{};
  const canCS=canEditSection("CS");
  const sc=n.successContract||{};
  const metrics=n.metrics||[];
  const signals=(a.softSignals||[]).filter(s=>!s.hidden&&s.status==='active');
  const checkpoints=n.checkpoints||[];

  // Dual track red flag detection
  const missedCP=checkpoints.some(cp=>cp.status==='not_held'&&cp.scheduledDate&&(demoNow()-new Date(cp.scheduledDate))/(86400000)>7);
  const disengaged=signals.some(s=>s.type==='risk'&&s.desc&&s.desc.toLowerCase().includes('unresponsive'));
  const noValue=a.dtr&&a.dtr<=60&&!metrics.some(m=>parseFloat(m.currentValue)>0);
  const escalation=signals.some(s=>s.type==='critical');
  const hasRedFlag=missedCP||disengaged||noValue||escalation;
  // Track 2 status persisted by computeRedFlags() in render()

  // Renewal readiness
  if(!n.renewalReadiness)n.renewalReadiness={};
  const rr=n.renewalReadiness;
  const rrQs=[
    {key:'q1',label:'Did we deliver the agreed success metric?',desc:'Progress vs contract goal, tracked at initiative level',proofKey:'q1Proof'},
    {key:'q2',label:'Can we prove it with data?',desc:'CSM-attributed value logged. Measurable, not anecdotal',proofKey:'q2Proof'},
    {key:'q3',label:'Does the client acknowledge it?',desc:'Validated at checkpoints. Client sign-off recorded',proofKey:'q3Proof'}
  ];
  const allYes=rr.q1==='yes'&&rr.q2==='yes'&&rr.q3==='yes';
  const anyNo=rr.q1==='no'||rr.q2==='no'||rr.q3==='no';

  const RENEWAL_ST=["Kickoff","MBR","QBR","Renewal"];
  const EXPAND_ST=["Value Proof","Expand Ask","New Scope","Close"];
  const t2Override=!!n.dualTrackOverride;
  const t2Effective=hasRedFlag&&!t2Override;

  return`<div>
    <!-- Dual Track -->
    ${hasRedFlag?`<div style="background:${t2Override?'#fff8eb':'#fff0f2'};border:2px solid ${t2Override?'#EF9637':'#FD576B'};border-radius:var(--rr2);padding:12px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px">
      <span style="font-size:16px">${t2Override?'\u26a0\ufe0f':'\ud83d\udea8'}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:${t2Override?'#d88520':'#e63950'}">${t2Override?'Red Flag Active \u2014 Track 2 Override Enabled':'Red Flag \u2014 Track 2 Paused'}</div>
        <div style="font-size:11px;color:${t2Override?'#8a4510':'#c42040'}">${missedCP?'Missed checkpoint. ':''}${disengaged?'Client unresponsive. ':''}${noValue?'No value logged near renewal. ':''}${escalation?'Escalation raised. ':''}${t2Override?'Track 2 proceeding despite red flag (manual override).':'Fix Track 1 first.'}</div>
      </div>
      ${canCS?`<button class="btn ${t2Override?'bg':'bs'} btn-sm" style="flex-shrink:0" onclick="toggleT2Override('${a.id}')">${t2Override?'Revoke Override':'Override \u2192 Proceed with Track 2'}</button>`:``}
    </div>`:``}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div style="background:#fff;border:1.5px solid ${hasRedFlag?'#FD576B':'#4A00F8'};border-radius:var(--rr2);padding:14px 16px">
        <div style="font-size:13px;font-weight:700;color:${hasRedFlag?'#FD576B':'#4A00F8'};margin-bottom:8px">\ud83d\udee1\ufe0f Track 1 \u2014 Renewal</div>
        <div style="font-size:10px;color:var(--t3);margin-bottom:10px">Deliver on initiatives. Prove ROI. Hold checkpoints.</div>
        <div style="display:flex;align-items:center;gap:0;margin-bottom:6px">${RENEWAL_ST.map((st,i)=>{const done=checkpoints.some(c=>c.type===st&&c.status==='signed_off');return(i>0?`<div style="flex:1;height:2px;background:${done?'#4A00F8':'#e8eef8'}"></div>`:'')+`<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:14px;height:14px;border-radius:50%;background:${done?'#4A00F8':'#e8eef8'};border:2px solid ${done?'#4A00F8':'#cbd5e1'};font-size:7px;color:#fff;display:flex;align-items:center;justify-content:center">${done?'\u2713':''}</div><div style="font-size:8px;font-weight:600;color:${done?'#4A00F8':'#94a3b8'}">${st}</div></div>`;}).join('')}</div>
      </div>
      <div style="background:#fff;border:1.5px solid ${t2Effective?'#94a3b8':'#40CC8F'};border-radius:var(--rr2);padding:14px 16px;${t2Effective?'opacity:0.5':''}">
        <div style="font-size:13px;font-weight:700;color:${t2Effective?'#94a3b8':'#40CC8F'};margin-bottom:8px">\ud83d\ude80 Track 2 \u2014 Expand ${t2Effective?'<span style="font-size:10px;font-weight:500">(paused)</span>':''}</div>
        <div style="font-size:10px;color:var(--t3);margin-bottom:10px">New categories, users, scope. Runs parallel unless Track 1 red.</div>
        <div style="display:flex;align-items:center;gap:0">${EXPAND_ST.map((st,i)=>{const done=i===0&&metrics.some(m=>parseFloat(m.currentValue)>0);return(i>0?`<div style="flex:1;height:2px;background:${done?'#40CC8F':'#e8eef8'}"></div>`:'')+`<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:14px;height:14px;border-radius:50%;background:${done?'#40CC8F':'#e8eef8'};border:2px solid ${done?'#40CC8F':'#cbd5e1'};font-size:7px;color:#fff;display:flex;align-items:center;justify-content:center">${done?'\u2713':''}</div><div style="font-size:8px;font-weight:600;color:${done?'#40CC8F':'#94a3b8'}">${st}</div></div>`;}).join('')}</div>
      </div>
    </div>

    <!-- Renewal Readiness -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:14px;font-weight:700">Renewal Readiness</span>
        ${allYes?`<span class="pill pg" style="font-size:10px">\u2705 Ready</span>`:anyNo?`<span class="pill pr" style="font-size:10px">\u26a0 Negotiation needed</span>`:`<span class="pill pgr" style="font-size:10px">Not assessed</span>`}
      </div>
      ${rrQs.map((q,i)=>{const ans=rr[q.key];const proof=rr[q.proofKey]||'';
      return`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;${i<2?'border-bottom:1px solid #f0f4fb':''}">
        <div style="width:22px;height:22px;border-radius:50%;background:${ans==='yes'?'#d4f5e5':ans==='no'?'#ffe0e5':'#f1f5f9'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${ans==='yes'?'#2fb87a':ans==='no'?'#e63950':'#94a3b8'};flex-shrink:0">${i+1}</div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600">${q.label}</div>
          <div style="font-size:10px;color:var(--t3)">${q.desc}</div>
          ${proof?`<div style="font-size:10px;color:#64748b;margin-top:3px;background:#f8f9fc;padding:4px 8px;border-radius:4px">${proof}</div>`:''}
        </div>
        ${canCS?`<div style="display:flex;gap:3px;flex-shrink:0">
          <button class="btn ${ans==='yes'?'bp':'bg'} btn-sm" style="padding:3px 8px;font-size:10px" onclick="updRR('${a.id}','${q.key}','yes')">\u2713</button>
          <button class="btn ${ans==='no'?'bp':'bg'} btn-sm" style="padding:3px 8px;font-size:10px;${ans==='no'?'background:#FD576B':''}" onclick="updRR('${a.id}','${q.key}','no')">\u2717</button>
        </div>`:``}
      </div>`;}).join('')}
      ${canCS?`<div style="margin-top:8px;display:flex;gap:6px;justify-content:center">
        <button class="btn ${rr.outcome==='renewed'?'bp':'bg'}" style="font-size:11px" onclick="updRR('${a.id}','outcome','renewed')">\u2705 Renewed</button>
        <button class="btn ${rr.outcome==='at_risk'?'bp':'bg'}" style="font-size:11px;${rr.outcome==='at_risk'?'background:#EF9637':''}" onclick="updRR('${a.id}','outcome','at_risk')">\u26a0 At Risk</button>
        <button class="btn ${rr.outcome==='not_renewed'?'bp':'bg'}" style="font-size:11px;${rr.outcome==='not_renewed'?'background:#FD576B':''}" onclick="updRR('${a.id}','outcome','not_renewed')">\u274c Not Renewed</button>
      </div>`:``}
    </div>

    <!-- VDD compact -->
    <div class="card" style="border-left:3px solid #35E1D4">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700">\ud83d\udcc4 Value Delivery Document</span>
        <div style="display:flex;gap:4px">
          ${canCS?`<button class="btn bs btn-sm" onclick="draftVDDWithAI('${a.id}')">\u2728 Draft with AI</button>`:``}
          <button class="btn bg btn-sm" onclick="downloadBVD('${a.id}')">Download PPT</button>
        </div>
      </div>
      ${sc.valueNarrative?`<div style="font-size:11px;color:#7a3800;font-style:italic;background:#fff8eb;border-radius:6px;padding:8px 10px;margin-bottom:8px;line-height:1.5">"${sc.valueNarrative}"</div>`:''}
      ${(()=>{if(!n.vdd)n.vdd={sections:[{title:"Client Strategic Priorities",content:"",lastUpdated:null},{title:"Agreed Success Metrics",content:"",lastUpdated:null},{title:"Beroe\u2019s Approach Per Initiative",content:"",lastUpdated:null},{title:"Value Delivered \u2014 CSM Attributed",content:"",lastUpdated:null}],updateHistory:[]};
      return n.vdd.sections.map((sec,i)=>`<div style="margin-bottom:8px">
        <div style="font-size:10px;font-weight:700;color:#35E1D4;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">${sec.title}</div>
        ${canCS?`<textarea class="ta" rows="3" style="font-size:11px" placeholder="${sec.title}..." oninput="updVDD('${a.id}',${i},this.value)">${sec.content||''}</textarea>`:`<div style="font-size:11px;padding:6px 8px;background:#f8f9fc;border-radius:6px;line-height:1.5">${sec.content||'\u2014'}</div>`}
      </div>`).join('');})()}
    </div>
  </div>`;
}

// Success Contract helpers
function updSC(acctId,key,val){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  if(!a.notes)a.notes={};if(!a.notes.successContract)a.notes.successContract={};
  a.notes.successContract[key]=val;
}
function lockSContract(acctId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  if(!a.notes)a.notes={};if(!a.notes.successContract)a.notes.successContract={};
  const sc=a.notes.successContract;
  if(!sc.metric1||!sc.metric1Unit){alert("Lock 1 incomplete: Define at least one success metric with a unit.");return;}
  if(!sc.measureSource||!sc.measureFreq){alert("Lock 2 incomplete: Define the measurement method and frequency.");return;}
  if(!sc.valueNarrative||sc.valueNarrative.length<10){alert("Lock 3 incomplete: Write a value narrative (at least 10 characters).");return;}
  // Quality check — warn but don't block
  const isVague=sc.metric1&&sc.metric1.length<30&&!/\d/.test(sc.metric1);
  if(isVague)S.scQualityWarning=true;
  sc.lockedDate=new Date().toISOString().slice(0,10);
  sc.lockedBy=S.user?.name||"CS";
  // Auto-create metrics from success contract if none exist
  if(!a.notes.metrics||a.notes.metrics.length===0){
    a.notes.metrics=[{id:"m_sc1",metric:sc.metric1,type:"quantitative",unit:sc.metric1Unit,target:"",currentValue:"",lastUpdated:null,lastUpdatedBy:"",statusOverride:null,linkedEntries:[]}];
    if(sc.metric2){a.notes.metrics.push({id:"m_sc2",metric:sc.metric2,type:"quantitative",unit:"%",target:"",currentValue:"",lastUpdated:null,lastUpdatedBy:"",statusOverride:null,linkedEntries:[]});}
  }
  render();
}
function unlockSContract(acctId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.successContract)return;
  a.notes.successContract.lockedDate=null;a.notes.successContract.lockedBy=null;
  S.scQualityWarning=false;render();
}

function addGoal(acctId,type){addGoalFreeform(acctId,type);}
function removeGoal(acctId,type){const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.csGoals)return;a.notes.csGoals=a.notes.csGoals.filter(g=>g.type!==type&&g.id!==('g_'+type));render();}
function updGoal(acctId,type,key,val){const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.csGoals)return;const g=a.notes.csGoals.find(x=>x.type===type||x.id===('g_'+type));if(g)g[key]=val;}

function removeGoalById(acctId,goalId){

}
// Goal Alignment helpers
function updGoalAlign(acctId,goalId,phase,key,val){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.csGoals)return;
  const g=a.notes.csGoals.find(x=>x.id===goalId||('g'+a.notes.csGoals.indexOf(x))===goalId);if(!g)return;
  if(!g[phase])g[phase]={};
  g[phase][key]=val;
}
function completePhase(acctId,goalId,phase){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.csGoals)return;
  const g=a.notes.csGoals.find(x=>x.id===goalId||('g'+a.notes.csGoals.indexOf(x))===goalId);if(!g)return;
  if(!g[phase])g[phase]={};
  if(phase==='phaseA')g.phaseA.phaseAComplete=true;
  if(phase==='phaseB')g.phaseB.phaseBComplete=true;
  if(phase==='phaseC')g.phaseC.phaseCComplete=true;
  // Update alignment status
  const pa=g.phaseA?.phaseAComplete;const pb=g.phaseB?.phaseBComplete;const pc=g.phaseC?.phaseCComplete;
  g.alignmentStatus=pa&&pb&&pc?'aligned':pa||pb||pc?'partial':'not_started';
  // History
  if(!g.goalHistory)g.goalHistory=[];
  g.goalHistory.push({date:demoNow().toISOString().slice(0,10),changedBy:S.user?.name||'CS',action:phase+' completed',previousState:null,reason:''});
  render();
}

async function extractGoalsFromVDD(acctId){
  const content=(document.getElementById('vdd-paste-content')||{}).value||'';
  if(!content.trim()){alert('Please upload or paste VDD content first.');return;}
  if(!S.anthropicKey||!S.anthropicKey.trim()){alert('Add an API key in the AI panel to enable goal extraction.');return;}
  S.vddExtractLoading=true;render();
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json","x-api-key":S.anthropicKey.trim(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,
        system:"You are helping a Customer Success Manager extract goals from a Value Delivery Document. Read the document and extract: (1) stated goals with their category type, (2) any savings targets or KPIs mentioned, (3) categories in scope, (4) any measurement method defined. Return ONLY a JSON array of goal objects, no other text: [{title:string,category:'cost_savings'|'base_rationalization'|'risk_mitigation'|'adoption'|'other',targetValue:string,targetDate:string,notes:string}]. If you cannot find clear goals, return an empty array.",
        messages:[{role:"user",content:content.slice(0,8000)}]})
    });
    if(!resp.ok)throw new Error("API error "+resp.status);
    const data=await resp.json();
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join('');
    const jsonMatch=txt.match(/\[[\s\S]*\]/);
    const goals=jsonMatch?JSON.parse(jsonMatch[0]):[];
    S.vddExtractedGoals=goals;S.vddExtractLoading=false;S.showVDDUpload=false;S.showVDDReview=true;render();
  }catch(err){
    S.vddExtractLoading=false;render();
    alert('Could not extract goals: '+(err.message||'Please paste the content and try again.'));
  }
}

function saveCheckpointSignOff(){
  const sm=S.signOffModal;if(!sm)return;
  const a=ACCOUNTS.find(x=>x.id===sm.acctId);if(!a||!a.notes||!a.notes.checkpoints)return;
  const cp=a.notes.checkpoints[sm.cpIdx];if(!cp)return;
  // Collect checked initiatives
  const initEls=document.querySelectorAll('.so-init:checked');
  const initiativesReviewed=Array.from(initEls).map(el=>({id:el.value,name:el.dataset.name,stage:el.dataset.stage}));
  // Collect checked metrics
  const metEls=document.querySelectorAll('.so-met:checked');
  const metricsReviewed=Array.from(metEls).map(el=>({id:el.value,name:el.dataset.name,value:el.dataset.value}));
  // Text fields
  const clientNote=(document.getElementById('so-client-note')||{}).value||'';
  const nextActions=(document.getElementById('so-next-actions')||{}).value||'';
  // Warning if empty
  if(initiativesReviewed.length===0&&metricsReviewed.length===0){
    if(!confirm('\u26a0\ufe0f No initiatives or metrics selected. Consider documenting what was reviewed for the renewal record.\n\nProceed anyway?'))return;
  }
  // Save
  cp.status='signed_off';
  cp.signedOff=true;
  cp.signedOffDate=demoNow().toISOString().slice(0,10);
  cp.signedOffBy=S.user?.name||'CS';
  cp.snapshot={initiativesReviewed:initiativesReviewed,metricsReviewed:metricsReviewed,clientAcknowledgement:clientNote,nextActionsAgreed:nextActions};
  set({signOffModal:null});
}

function saveEscalation(acctId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  if(!a.notes)a.notes={};if(!a.notes.escalations)a.notes.escalations=[];
  const reason=(document.getElementById('esc-reason')||{}).value||'';
  const typeEl=document.querySelector('input[name="esc-type"]:checked');
  const owner=(document.getElementById('esc-owner')||{}).value||'';
  const next=(document.getElementById('esc-next')||{}).value||'';
  if(!reason.trim()||!typeEl||!owner.trim()){alert('Please fill in reason, type, and owner.');return;}
  a.notes.escalations.push({id:'esc'+Date.now(),date:demoNow().toISOString().slice(0,10),raisedBy:S.user?.name||'',reason:reason,type:typeEl.value,owner:owner,nextAction:next,status:'open',resolvedDate:'',resolvedNote:''});
  set({showEscModal:null});
}
function resolveEscalation(acctId,escId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.escalations)return;
  const esc=a.notes.escalations.find(e=>e.id===escId);if(!esc)return;
  const note=prompt('Resolution note:');if(note===null)return;
  esc.status='resolved';esc.resolvedDate=demoNow().toISOString().slice(0,10);esc.resolvedNote=note;render();
}
function buildEscalationSection(a){

function linkPlayToMetric(acctId,playId,metricId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  const p=(a.plan?.plays||[]).find(x=>x.id===playId);if(!p)return;
  const metric=(a.notes?.metrics||[]).find(m=>m.id===metricId);if(!metric)return;
  if(!p.linkedMetrics)p.linkedMetrics=[];
  if(p.linkedMetrics.includes(metricId)){
    p.linkedMetrics=p.linkedMetrics.filter(id=>id!==metricId);
    metric.linkedEntries=metric.linkedEntries.filter(e=>!(e.type==='plan'&&e.refId===playId));
  }else{
    p.linkedMetrics.push(metricId);
    const today=new Date().toISOString().slice(0,10);
    metric.linkedEntries.unshift({type:"plan",refId:playId,source:"tagged",impactNote:p.title+" ($"+(p.value/1000).toFixed(0)+"K, "+p.prob+"%)",impactDirection:p.prob>=60?"up":"flat",linkedAt:today,linkedBy:S.user?.name||"CS",dismissed:false});
  }
  render();
}

function bDualTrack(a,h){
  const n=a.notes||{};
  if(!n.dualTrack)n.dualTrack={renewal:{status:'on_track',stations:[]},expand:{status:'on_track',stations:[]}};
  const dt=n.dualTrack;
  const canCS=canEditSection("CS");
  const curMode=getAccountMode(a);
  const modeConf=PLAY_MODES[curMode]||PLAY_MODES.expand;

  // Red flag detection
  const signals=(a.softSignals||[]).filter(s=>!s.hidden&&s.status==='active');
  const checkpoints=n.checkpoints||[];
  const metrics=n.metrics||[];
  const missedCheckpoint=checkpoints.some(cp=>cp.status==='not_held'&&cp.scheduledDate&&(demoNow()-new Date(cp.scheduledDate))/(86400000)>7);
  const disengaged=signals.some(s=>s.type==='risk'&&s.desc&&s.desc.toLowerCase().includes('unresponsive'));
  const noValueLogged=a.dtr&&a.dtr<=60&&!metrics.some(m=>parseFloat(m.currentValue)>0);
  const escalation=signals.some(s=>s.type==='critical');
  const hasRedFlag=missedCheckpoint||disengaged||noValueLogged||escalation;
  const t1Status=hasRedFlag?'red':dt.renewal.status;
  const t2Paused=hasRedFlag;

  const RENEWAL_STATIONS=["Kickoff","MBR","QBR","Renewal"];

  return`<div>

          ${escalation?'\u2022 Client escalation raised<br>':''}

        </div>
      </div>
    </div>`:''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <!-- Track 1: Renewal -->
      <div class="card" style="border-top:3px solid ${t1Status==='red'?'#FD576B':'#40CC8F'}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <span style="font-size:16px">\ud83d\udee1\ufe0f</span>
          <div>
            <div style="font-size:14px;font-weight:700">Track 1 \u2014 Renewal</div>
            <div style="font-size:10px;color:var(--t3)">Deliver on agreed initiatives. Prove ROI against success contract.</div>

          <span class="pill ${t1Status==='red'?'pr':t1Status==='on_track'?'pg':'pa'}" style="font-size:10px;margin-left:auto">${t1Status==='red'?'\ud83d\udd34 Red':t1Status==='on_track'?'\ud83d\udfe2 On Track':'\ud83d\udfe1 At Risk'}</span>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 10px">

            </div>`;

        </div>
        <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px">Bare Minimum \u2014 Non-negotiable</div>

  }).slice(0,3);
  const activePlays=(a.plan?.plays||[]).filter(p=>!p.hidden&&p.prob>=60);

    <div style="display:flex;align-items:flex-start;gap:14px">
      <div style="font-size:28px">\ud83d\ude80</div>
      <div style="flex:1">

        <div style="display:flex;gap:10px">

            <span>\u2705</span> New Account (Sales Handoff)<br><span style="font-size:10px;font-weight:400;opacity:0.7">Sales has passed a complete handover package</span>
          </button>

            <span>\ud83d\udd04</span> Existing Account (No Handover)<br><span style="font-size:10px;font-weight:400;color:#94a3b8">Picking up mid-contract with no clean handover from Sales</span>

            <span>\ud83d\udccb</span> Pre-Sales & Discovery

  <!-- Account Type Classification -->

    <div style="font-size:13px;font-weight:700;color:var(--t1);margin-bottom:8px">Classify this account</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:12px">Account type determines what success metrics are available and how value is tracked. Set once before defining the success contract.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

      </button>
      <button style="padding:14px;border-radius:10px;border:2px solid #40CC8F30;background:#fff;cursor:pointer;text-align:left" onclick="setAccountType('${a.id}','adoption')">

  <!-- Priority Action Card -->

function bLanding(a,h,m){

  const hotCats=(a.catIntel?.topCats||[]).filter(c=>c.heat==="hot");
  const topAct=(a.activityFeed||[]).filter(x=>!x.hidden).slice(0,2);
  const ckDue=getKeyTodos(a);
  const n=a.notes||{};

function getKeyTodos(a){
  const todos=[];
  if(a.onboarding.d30done<a.onboarding.d30total) todos.push({text:"Complete 30-day onboarding tasks",priority:"high",phase:"Onboarding"});
  if(a.onboarding.d60done<a.onboarding.d60total) todos.push({text:"Complete 60-day optimisation tasks",priority:"medium",phase:"Onboarding"});
  const crits=(a.softSignals||[]).filter(x=>x.impact==="critical"&&!x.hidden&&x.status==='active');
  crits.forEach(s=>todos.push({text:"Address: "+s.signal,priority:"high",phase:"Signals"}));
  if(a.dtr&&a.dtr<=90){todos.push({text:"Prepare renewal proposal ("+a.dtr+"d remaining)",priority:"high",phase:"Renewal"});todos.push({text:"Schedule stakeholder alignment meeting",priority:"high",phase:"Renewal"});}
  if(a.dtr&&a.dtr<=180&&a.dtr>90){todos.push({text:"Begin renewal preparation strategy",priority:"medium",phase:"Renewal"});}
  (a.plan?.plays||[]).slice(0,2).forEach(p=>todos.push({text:"Execute: "+p.title,priority:p.prob>=60?"high":"medium",phase:"Expansion"}));
  return todos;
}

${appetiteResult.utilizationGate?`

function addDefaultPlay(acctId,mode,idx){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  const defaults=MODE_DEFAULT_PLAYS[mode]||[];const dp=defaults[idx];if(!dp)return;
  if(!a.plan)a.plan={narrative:null,generatedAt:null,plays:[],currentMode:null,modeHistory:[]};
  if(!a.plan.plays)a.plan.plays=[];
  a.plan.plays.push({id:"pl"+Date.now(),rank:a.plan.plays.length+1,title:dp.title,value:dp.value,prob:dp.prob,when:dp.when,trigger:dp.trigger,addedBy:S.user.name,role:S.user.role,hidden:false,modes:[mode]});
  render();
}

        </div>`;

      ${deletedGoals.length>0?`<details style="margin-top:6px"><summary style="font-size:10px;color:var(--t3);cursor:pointer">Show deleted goals (${deletedGoals.length})</summary><div style="margin-top:6px">${deletedGoals.map(g=>`<div style="background:#f8f9fc;border:1px solid var(--cb);border-radius:6px;padding:8px 10px;margin-bottom:4px;opacity:0.6;display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--t3);flex:1;text-decoration:line-through">${g.title||g.type||'Goal'}</span>${canEdit?`<button class="btn bg btn-sm" style="font-size:8px" onclick="restoreGoal('${a.id}','${gid(g,0)}')">Restore</button>`:``}</div>`).join('')}</div></details>`:``}
    </div>`;
  })()}

  <!-- VDD now lives in Success Management > Delivery & Renewal -->
  <div style="background:#f0fdfa;border:1.5px solid #35E1D430;border-radius:var(--rr);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px">

// Kit helper functions
function ukn(id,k,v){const a=ACCOUNTS.find(x=>x.id===id);if(!a)return;if(!a.notes)a.notes={};a.notes[k]=v;}
function handleKitFile(id,input,fileKey){if(input.files&&input.files[0]){const a=ACCOUNTS.find(x=>x.id===id);if(!a)return;if(!a.notes)a.notes={};a.notes[fileKey]=input.files[0].name;
  // Auto-extract: read file and trigger extraction if it's a solutioning or pre-sales upload
  const reader=new FileReader();reader.onload=function(e){
    const content=e.target.result;
    if(fileKey==="momFileName"&&content){a.notes.momContent=content;setTimeout(()=>extractPreSalesAI(id),300);}
    if(fileKey==="sol_fileName"&&content){a.notes.sol_fileContent=content;setTimeout(()=>extractSolAI(id),300);}
  };
  try{reader.readAsText(input.files[0]);}catch(e){}
  render();}}
function loadDemoMoM(id){const a=ACCOUNTS.find(x=>x.id===id);if(!a)return;if(!a.notes)a.notes={};if(a.industry==="Pharmaceuticals"&&a.id!=="siemens"){a.notes.momFileName="teva_discovery_mom.txt";a.notes.momContent=DEMO_MOM_TEVA;}else{a.notes.momFileName="discovery_meeting_mom.txt";a.notes.momContent=DEMO_MOM;}render();}

  else{n.sol_participants=n.spoc||a.co||"Key Stakeholders";}
  n.sol_keyUsers=n.sol_keyUsers||"Category Managers, Sourcing Analysts, Leadership";

  n.sol_valueThemes=n.sol_valueThemes||"Platform Consolidation, Supplier Risk, AI-Powered Research, Cost Optimization";
  // Industry-specific VPD metrics
  const vpdMetricsByIndustry={
    "Pharmaceuticals":[
      {metric:"Supply Risk Events Intercepted",metricType:"quantitative",unit:"#",target:"10",rationale:"Early detection of API supply chain risks before they impact manufacturing",checked:true},
      {metric:"API Sourcing Cost Reduction",metricType:"quantitative",unit:"%",target:"5",rationale:"Cost optimization through competitive intelligence on API sourcing",checked:true},
      {metric:"Supplier Qualification Acceleration",metricType:"quantitative",unit:"#",target:"5",rationale:"Number of new suppliers qualified using Beroe intelligence",checked:true},
      {metric:"Business value realized",metricType:"qualitative",unit:"",target:"High",rationale:"Executive perception of procurement intelligence value",checked:true}
    ],
    "Food & Beverages":[
      {metric:"Negotiation Savings",metricType:"quantitative",unit:"$",target:"2000000",rationale:"Commodity negotiation savings from price intelligence and should-cost models",checked:true},
      {metric:"Cost Avoidance",metricType:"quantitative",unit:"$",target:"500000",rationale:"Cost avoidance through early price signal detection",checked:true},
      {metric:"Supplier Diversification",metricType:"quantitative",unit:"#",target:"8",rationale:"New RSPO-compliant or alternative suppliers identified and qualified",checked:true},
      {metric:"Business value realized",metricType:"qualitative",unit:"",target:"High",rationale:"Executive perception of procurement intelligence value",checked:true}
    ],
    "default":[
      {metric:"Cost Savings Identified",metricType:"quantitative",unit:"$",target:"1000000",rationale:"Documented savings from intelligence-driven negotiations",checked:true},
      {metric:"Supply Chain Risk Mitigation",metricType:"quantitative",unit:"#",target:"10",rationale:"Risk events detected and actioned through supplier monitoring",checked:true},
      {metric:"Spec Harmonization Savings",metricType:"quantitative",unit:"$",target:"500000",rationale:"Cost reduction through specification optimization across categories",checked:true},
      {metric:"Platform adoption rate",metricType:"quantitative",unit:"%",target:"80",rationale:"Measures successful adoption of Beroe as primary intelligence platform",checked:true},
      {metric:"Business value realized",metricType:"qualitative",unit:"",target:"High",rationale:"Executive perception of value for renewal justification",checked:true}
    ]
  };
  S.pendingVPDMetrics=vpdMetricsByIndustry[a.industry]||vpdMetricsByIndustry["default"];
  S.showVPDMetricsReview=true;
  render();
}

function passSolToHandoff(id){
  const a=ACCOUNTS.find(x=>x.id===id);if(!a||!a.notes)return;
  const n=a.notes;
  if(!n.sol_valueDefinition){alert("Please fill in the VPD Value Definition first.");return;}
  n.sh_valueFromSolutioning=n.sol_valueDefinition;
  n.sh_valueThemesFromSolutioning=n.sol_valueThemes||"";
  n.sh_valueReceivedAt=new Date().toISOString().slice(0,10);
  n.sol_locked=true;

function calcMetricStatus(sm){
  if(sm.statusOverride)return{status:sm.statusOverride,reason:sm.statusOverrideReason};
  const cps=sm.checkpoints||{};
  const cpOrder=["q12","q11","q10","q9","q8","q7","q6","q5","q4","q3","q2","q1","baseline"];
  let latestVal=null;
  for(const cp of cpOrder){if(cps[cp]!=null&&cps[cp]!==""){latestVal=cps[cp];break;}}
  if(latestVal===null)return{status:"grey"};
  if(sm.metricType==="qualitative"){
    if(latestVal==="High")return{status:"green"};
    if(latestVal==="Medium")return{status:"amber"};
    return{status:"red"};
  }
  if(!sm.target)return{status:"grey"};
  const target=parseFloat(String(sm.target).replace(/[^0-9.]/g,""));
  const current=parseFloat(String(latestVal).replace(/[^0-9.]/g,""));
  if(isNaN(target)||isNaN(current)||target===0)return{status:"grey"};
  const pct=current/target*100;
  if(pct>=90)return{status:"green"};
  if(pct>=60)return{status:"amber"};
  return{status:"red"};
}
function calcMetricTrend(sm,cp1,cp2){
  const cps=sm.checkpoints||{};
  if(!cp1||!cp2||!cps[cp1]||!cps[cp2])return{trend:"none",icon:"\u2014",col:""};
  if(sm.metricType==="qualitative"){
    const order={"Low":0,"Medium":1,"High":2};
    const prev=order[cps[cp1]]!=null?order[cps[cp1]]:-1, curr=order[cps[cp2]]!=null?order[cps[cp2]]:-1;
    if(curr>prev)return{trend:"up",icon:"\u2191",col:"#40CC8F"};
    if(curr<prev)return{trend:"down",icon:"\u2193",col:"#FD576B"};
    return{trend:"stable",icon:"\u2192",col:"#EF9637"};
  }
  const prev=parseFloat(String(cps[cp1]).replace(/[^0-9.]/g,""));
  const curr=parseFloat(String(cps[cp2]).replace(/[^0-9.]/g,""));
  if(isNaN(prev)||isNaN(curr))return{trend:"none",icon:"\u2014",col:""};
  const diff=prev>0?((curr-prev)/prev)*100:curr>0?100:0;
  if(diff>5)return{trend:"up",icon:"\u2191",col:"#40CC8F"};
  if(diff<-5)return{trend:"down",icon:"\u2193",col:"#FD576B"};
  return{trend:"stable",icon:"\u2192",col:"#EF9637"};
}

function handleProposalUpload(input){
  if(input.files&&input.files[0]){
    const file=input.files[0];
    S.uploadedProposals.push({name:file.name,date:new Date().toISOString().slice(0,10),uploadedBy:S.user?S.user.name:"Unknown"});
    input.value="";
    render();
  }
}
function removeProposal(idx){
  S.uploadedProposals.splice(idx,1);
  render();
}

function showMaterialDetail(name){
  let summary="";
  DOC_MATERIALS.forEach(g=>{g.items.forEach(item=>{if(item.name===name)summary=item.summary;});});
  const modal=document.createElement("div");
  modal.className="modal-bg";
  modal.onclick=function(e){if(e.target===modal)modal.remove();};
  modal.innerHTML=`<div class="modal"><div class="modal-h">${name} <button onclick="this.closest('.modal-bg').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1">\u00d7</button></div><div style="font-size:12px;color:#2d1870;line-height:1.8">${summary}</div><div style="margin-top:14px"><button class="btn bg" onclick="this.closest('.modal-bg').remove()">Close</button></div></div>`;
  document.body.appendChild(modal);
}

function getOrInitExtIntelStore(a){
  if(!S.extIntelStore[a.id]){
    const baseNews=getExtIntelNews(a).map((n,i)=>({...n,id:"news_"+i,isNew:false,signalCreated:false,signalRelevance:i<3?"high":"medium"}));
    S.extIntelStore[a.id]={items:baseNews,lastRefreshed:new Date(Date.now()-3600000*2).toISOString()};
  }
  return S.extIntelStore[a.id];
}

function refreshExtIntel(acctId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  const store=getOrInitExtIntelStore(a);
  store.items.forEach(n=>{n.isNew=false;});
  store.items.unshift({id:"new_"+Date.now(),headline:a.name+" announces procurement strategy review",category:"Financial Performance & Cost Pressure",date:new Date().toISOString().slice(0,10),source:"Bloomberg",summary:"Latest analysis shows strategy reassessment.",fullContent:"Strategy review initiated.",isNew:true,signalCreated:false,signalRelevance:"high"});
  store.lastRefreshed=new Date().toISOString();
  render();
}

function pushNewsAsSignal(acctId,newsId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  const store=getOrInitExtIntelStore(a);
  const news=store.items.find(n=>n.id===newsId);if(!news)return;
  const typeMap={"Financial Performance & Cost Pressure":"risk","Supply Chain Disruptions":"critical","Supplier Strategy & Partnerships":"neutral","Expansion & Capex Plans":"expansion","Regulatory & Compliance Changes":"risk","Sustainability & ESG Initiatives":"positive","Digital Transformation & Procurement Tech":"positive","Risk Signals & Geopolitical Exposure":"risk"};
  const sigType=typeMap[news.category]||"neutral";
  if(!a.softSignals)a.softSignals=[];
  const today=new Date().toISOString().slice(0,10);
  a.softSignals.push({id:"news"+Date.now(),date:today,type:sigType,category:"strategic",signal:news.headline.slice(0,80),desc:news.summary,addedBy:S.user.name,impact:news.signalRelevance==="high"?"high":"medium",hidden:false,status:'active',validUntil:calcValidUntil(today,sigType),resolvedNote:null,resolvedDate:null,source:"External Intelligence \u2014 "+news.source,aiExtracted:true,linkedMetrics:[]});
  news.signalCreated=true;
  render();
}

function getHighRelevanceNewCount(a){const store=S.extIntelStore[a.id];if(!store)return 0;return store.items.filter(n=>n.isNew&&n.signalRelevance==="high").length;}
