<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Beroe · Account Work Bench v20</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#EAF1F5;--card:#fff;--cb:#e4eaf6;--navy:#001137;--n2:#001a45;--n3:#002050;--bd:#001e52;--blue:#4A00F8;--teal:#35E1D4;--amb:#EF9637;--grn:#40CC8F;--red:#FD576B;--pur:#C344C7;--cor:#EF9637;--t1:#0d1b2e;--t2:#5a7896;--t3:#8496b0;--t4:#b0c0d0;--rr:10px;--rr2:14px}
html,body{height:100%;font-family:"DM Sans",system-ui,sans-serif;background:var(--bg);color:var(--t1);overflow:hidden}
button,input,select,textarea{font-family:"DM Sans",sans-serif}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccd5e8;border-radius:99px}
#root{display:flex;height:100vh;overflow:hidden}
.sb{width:224px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--bd)}
.sb-logo{padding:14px 16px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px}
.sb-mark{width:28px;height:28px;background:linear-gradient(135deg,#4A00F8,#3800CC);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#fff;flex-shrink:0}
.sb-nav{padding:8px 8px 0;flex:1;overflow-y:auto}
.sb-sec{font-size:9px;color:#1e3a6c;padding:8px 8px 3px;letter-spacing:.1em;font-weight:700;text-transform:uppercase}
.sb-btn{width:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:#5a7ea0;font-size:11px;cursor:pointer;margin-bottom:1px;text-align:left;transition:all .15s}
.sb-btn:hover{background:var(--n3);color:#90b4d0}
.sb-btn.active{background:#001e52;color:#fff;font-weight:700}
.sb-ic{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;flex-shrink:0;border:1.5px solid}
.sb-user{padding:10px 12px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.card{background:var(--card);border-radius:var(--rr2);border:1px solid var(--cb);padding:16px 18px}
.kpi{background:var(--card);border:1px solid var(--cb);border-radius:var(--rr);padding:11px 14px}
.kpi-l{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.kpi-v{font-size:22px;font-weight:700;line-height:1.1}
.kpi-s{font-size:11px;color:var(--t3);margin-top:2px}
.btn{padding:7px 15px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--blue);color:#fff}.bp:hover{background:#3800CC}
.bs{background:#ede6ff;color:var(--blue);border:1px solid #c9b5ff}.bs:hover{background:#e0d5ff}
.bg{background:none;border:1px solid var(--cb);color:var(--t2)}.bg:hover{background:#f8f9fc}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pg{background:#d4f5e5;color:#146a45}.pa{background:#fef0c0;color:#8a4510}
.po{background:#fff0e5;color:#c45010}.pr{background:#ffe0e5;color:#c42040}
.pgr{background:#f1f5f9;color:#64748b}.pp{background:#f5e0f6;color:#8a1a90}
.pb{background:#ede6ff;color:#3800CC}
.inp{width:100%;padding:7px 10px;border:1.5px solid var(--cb);border-radius:7px;font-size:12px;background:#fff;color:var(--t1);margin-bottom:8px;transition:border .15s}
.inp:focus{outline:none;border-color:var(--blue)}
.ta{width:100%;padding:7px 10px;border:1.5px solid var(--cb);border-radius:7px;font-size:12px;resize:vertical;background:#fff;color:var(--t1);margin-bottom:8px;line-height:1.6;min-height:52px}
.ta:focus{outline:none;border-color:var(--blue)}
.tab-bar{display:flex;border-bottom:1.5px solid var(--cb);overflow-x:auto;flex-shrink:0}
.tab-b{padding:9px 14px;border:none;background:none;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;transition:all .12s;flex-shrink:0}
.tab-b.active{color:var(--blue);font-weight:700;border-bottom-color:var(--blue)}
.tab-b:hover:not(.active){color:var(--blue)}
.per-bar{display:flex;gap:2px;background:#edf0f9;border-radius:8px;padding:3px;flex-shrink:0}
.per-btn{padding:4px 12px;border-radius:6px;border:none;font-size:11px;font-weight:500;cursor:pointer;color:#64748b;background:transparent;transition:all .12s}
.per-btn.active{background:#fff;color:var(--blue);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.barbg{background:#e8eef8;border-radius:99px;height:5px;overflow:hidden;flex:1}
.barf{height:5px;border-radius:99px;transition:width .6s}
.srow{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f4fb}
.srow:last-child{border-bottom:none}
.srow-l{font-size:12px;color:#64748b;flex:1}
.srow-v{font-size:12px;font-weight:700;color:var(--t1);text-align:right}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh-t{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--t1)}
.spin{width:14px;height:14px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spin-b{border-color:rgba(74,0,248,.3);border-top-color:var(--blue)}
.ai-out{background:#f3f0ff;border:1px solid #d0c5f5;border-radius:10px;padding:14px;margin-top:10px;font-size:12px;line-height:1.85;color:#2d1870;white-space:pre-wrap;font-family:"DM Mono",monospace;max-height:420px;overflow-y:auto}
.err-box{background:#fff0f2;border:1px solid #ffbcc5;border-radius:8px;padding:9px 12px;font-size:12px;color:#c42040;margin-top:8px}
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{text-align:left;padding:7px 10px;color:var(--t3);font-size:10px;font-weight:700;letter-spacing:.06em;border-bottom:1.5px solid var(--cb);white-space:nowrap}
.dt td{padding:9px 10px;border-bottom:1px solid #f0f4fb;vertical-align:middle}
.dt tr:hover td{background:#f8f9fd}
.ins{border-left:3px solid var(--blue);background:#f3f0ff;padding:10px 13px;border-radius:0 9px 9px 0;font-size:12px;line-height:1.65;color:#2d1870;margin-bottom:9px}
.ins.amber{border-color:var(--amb);background:#fff8eb;color:#7a3800}
.ins.green{border-color:var(--grn);background:#f0fdf4;color:#14532d}
.ins.purple{border-color:var(--pur);background:#fdf0fd;color:#6b1070}
.ins.red{border-color:var(--red);background:#fff0f2;color:#c42040}
.cp{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin:2px;border:1px solid}
.cp-hot{background:#fff0f2;border-color:#ffbcc5;color:#e63950}
.cp-warm{background:#fff8eb;border-color:#fcd34d;color:#d88520}
.cp-cold{background:#f1f5f9;border-color:#cbd5e1;color:#475569}
.cp-ws{background:#f3f0ff;border-color:#a78bfa;color:#4A00F8;border-style:dashed}
.sig-e{background:#fff;border:1px solid var(--cb);border-radius:var(--rr);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;transition:box-shadow .15s}
.sig-e:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.sig-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.act-wrap{display:flex;gap:12px;margin-bottom:14px;position:relative}
.act-line{position:absolute;left:17px;top:36px;bottom:-14px;width:2px;background:var(--cb)}
.act-ic{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;border:1.5px solid;z-index:1}
.act-card{flex:1;background:#fff;border:1px solid var(--cb);border-radius:var(--rr);padding:11px 13px}
.act-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px}
.act-ai{display:inline-flex;align-items:center;font-size:11px;background:#f3f0ff;border:1px solid #c9b5ff;border-radius:6px;padding:3px 9px;color:#4A00F8;margin:2px}
.acv-bg{background:#e8eef8;border-radius:99px;height:12px;overflow:hidden;position:relative}
.acv-fill{height:100%;border-radius:99px;transition:width .8s}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto}
.modal-h{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.fl{font-size:10px;font-weight:700;color:#6b7fa0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;display:block}
.fg{margin-bottom:11px}
.lw{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 25% 55%,rgba(74,0,248,.2) 0%,transparent 60%)}
.lc{background:#000d28;border:1px solid var(--bd);border-radius:20px;padding:32px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.li{width:100%;padding:11px 14px;background:#000a20;border:1.5px solid var(--bd);border-radius:9px;color:#c8ddf0;font-size:13px;margin-bottom:9px;font-family:"DM Sans",sans-serif;transition:border .15s}
.li:focus{outline:none;border-color:var(--blue)}
.lb{width:100%;padding:12px;background:linear-gradient(135deg,#4A00F8,#3800CC);border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif}
.lb:hover{background:linear-gradient(135deg,#3800CC,#2a0099)}
.qc{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;margin-bottom:5px;transition:all .15s}
.qc:hover{background:rgba(255,255,255,.055)}
.jstep{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;z-index:1}
.jdot{width:12px;height:12px;border-radius:50%;border:2px solid;flex-shrink:0;transition:all .3s}
.jline{flex:1;height:2px}
.jlabel{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:5px;text-align:center}
.ck-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:8px;margin-bottom:3px;cursor:pointer;transition:background .12s}
.ck-item:hover{background:#f8f9fc}
.ck-num{width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#e8eef8;color:#64748b}
.ck-num.done{background:#d4f5e5;color:#2fb87a}
.ck-num.prog{background:#fef0c0;color:#8a4510}
.ck-num.run{background:#ede6ff;color:#4A00F8}
.sec-bar{display:flex;border-radius:6px;overflow:hidden;height:10px;gap:1px}
.sec-seg{height:100%;transition:flex .5s}
.file-drop{border:2px dashed var(--cb);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:#fafbfe}
.file-drop:hover{border-color:var(--blue);background:#f3f0ff}
.sub-tab-bar{display:flex;gap:2px;background:#edf0f9;border-radius:8px;padding:3px;margin-bottom:14px}
.sub-tab{padding:5px 14px;border-radius:6px;border:none;font-size:11px;font-weight:500;cursor:pointer;color:#64748b;background:transparent;transition:all .12s}
.sub-tab.active{background:#fff;color:var(--blue);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.del-btn{background:#ffe0e5;border:1px solid #ffbcc5;color:#e63950;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:6px;opacity:1;transition:all .15s;font-weight:600}
.del-btn:hover{background:#ffd0d5;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.hide-btn{background:#f1f5f9;border:1px solid #e2e8f0;color:#64748b;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:6px;opacity:1;transition:all .15s;font-weight:600}
.hide-btn:hover{background:#e8eef8;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.edit-btn{background:#f3f0ff;border:1px solid #d0c5f5;color:#4A00F8;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:6px;opacity:1;transition:all .15s;font-weight:600}
.edit-btn:hover{opacity:1;background:#ede6ff}
.gauge{position:relative;width:80px;height:80px;border-radius:50%}
.dl-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--cb);background:#fff;font-size:11px;font-weight:500;cursor:pointer;color:var(--t2);display:inline-flex;align-items:center;gap:4px}
.dl-btn:hover{background:#f8f9fc;border-color:var(--blue)}
.seg-ctrl{display:flex;gap:2px;background:#edf0f9;border-radius:8px;padding:3px}
.seg-btn{padding:5px 14px;border-radius:6px;border:none;font-size:11px;font-weight:500;cursor:pointer;color:#64748b;background:transparent;transition:all .12s}
.seg-btn.active{background:#fff;color:var(--blue);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mode-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700}
/* Global Search */
.gsearch{position:relative;margin-left:auto}
.gsearch-inp{width:260px;padding:7px 32px 7px 12px;border:1.5px solid var(--cb);border-radius:8px;font-size:12px;background:#fff;color:var(--t1);transition:all .2s}
.gsearch-inp:focus{width:380px;outline:none;border-color:var(--blue);box-shadow:0 2px 12px rgba(74,0,248,.12)}
.gsearch-hint{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:#94a3b8;pointer-events:none;background:#f1f5f9;padding:1px 6px;border-radius:4px;font-weight:600}
.gsearch-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;min-width:400px;max-height:420px;overflow-y:auto;background:#fff;border:1px solid var(--cb);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.15);z-index:999;padding:8px 0}
.gsearch-drop:empty{display:none}
.gs-group{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:8px 14px 4px}
.gs-item{display:flex;align-items:flex-start;gap:10px;padding:7px 14px;cursor:pointer;transition:background .1s}
.gs-item:hover,.gs-item.gs-active{background:#f3f0ff}
.gs-item-title{font-size:12px;font-weight:600;color:var(--t1)}
.gs-item-sub{font-size:11px;color:#64748b;margin-top:1px}
.gs-item mark{background:#EF963740;color:inherit;padding:0 1px;border-radius:2px}
.gs-acct-pill{font-size:9px;background:var(--cb);color:var(--t2);padding:1px 7px;border-radius:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.gs-empty{padding:20px 14px;text-align:center;color:var(--t3);font-size:12px}
/* AI Assistant Panel */
.ai-panel{width:380px;background:#fff;border-left:1px solid var(--cb);display:flex;flex-direction:column;flex-shrink:0;height:100%;transition:width .2s}
.ai-panel.closed{width:0;overflow:hidden;border:none}
.ai-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:900;background:var(--blue);color:#fff;border:none;border-radius:8px 0 0 8px;padding:10px 10px;cursor:pointer;font-size:12px;font-weight:700;writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:.05em;box-shadow:-2px 2px 12px rgba(74,0,248,.2)}
.ai-toggle:hover{background:#3800CC}
.ai-header{padding:12px 16px;border-bottom:1px solid var(--cb);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:92%;padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.7}
.ai-msg-user{align-self:flex-end;background:#f3f0ff;color:#2d1870;border-bottom-right-radius:4px}
.ai-msg-ai{align-self:flex-start;background:#f8f9fc;border:1px solid #e8eef8;border-left:3px solid var(--blue);border-bottom-left-radius:4px;color:var(--t1)}
.ai-msg-ai .ai-icon{font-size:10px;color:var(--blue);margin-bottom:4px}
.ai-input-area{padding:10px 14px;border-top:1px solid var(--cb);flex-shrink:0}
.ai-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.ai-chip{padding:4px 10px;border-radius:16px;border:1px solid var(--cb);background:#fff;font-size:10px;color:var(--t2);cursor:pointer;transition:all .12s;white-space:nowrap}
.ai-chip:hover{background:#f3f0ff;border-color:var(--blue);color:var(--blue)}
.ai-inp-wrap{display:flex;gap:6px;align-items:flex-end}
.ai-textarea{flex:1;padding:8px 10px;border:1.5px solid var(--cb);border-radius:8px;font-size:12px;resize:none;min-height:36px;max-height:100px;font-family:inherit;line-height:1.5}
.ai-textarea:focus{outline:none;border-color:var(--blue)}
.ai-send{padding:8px 14px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.ai-send:hover{background:#3800CC}
.ai-send:disabled{opacity:.5;cursor:default}
.ai-typing{display:inline-block;width:6px;height:14px;background:var(--blue);border-radius:2px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* ── Metric Intelligence Design Tokens (v18) ── */
:root{
--mi-canvas:#0d0f14;--mi-s0:#131620;--mi-s1:#1a1e2e;--mi-s2:#222740;--mi-s3:#2c3254;
--mi-rim:rgba(255,255,255,.07);--mi-rim-s:rgba(255,255,255,.12);
--src-signal:#C344C7;--src-signal-g:rgba(195,68,199,.18);
--src-activity:#4A00F8;--src-activity-g:rgba(74,0,248,.18);
--src-analytics:#40CC8F;--src-analytics-g:rgba(64,204,143,.18);
--src-util:#EF9637;--src-util-g:rgba(239,150,55,.18);
--src-plan:#35E1D4;--src-plan-g:rgba(53,225,212,.18);
--src-intel:#35E1D4;--src-intel-g:rgba(53,225,212,.18);
--src-bvd:#40CC8F;--src-bvd-g:rgba(64,204,143,.18);
--src-manual:#94a3b8;--src-manual-g:rgba(148,163,184,.18);
--st-green:#40CC8F;--st-green-g:rgba(64,204,143,.15);
--st-amber:#EF9637;--st-amber-g:rgba(239,150,55,.15);
--st-red:#FD576B;--st-red-g:rgba(253,87,107,.15);
}
.src-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:9.5px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:.03em;white-space:nowrap}
.src-pill.sp-signal{background:var(--src-signal-g);color:var(--src-signal);border:1px solid rgba(195,68,199,.25)}
.src-pill.sp-activity{background:var(--src-activity-g);color:var(--src-activity);border:1px solid rgba(74,0,248,.25)}
.src-pill.sp-analytics{background:var(--src-analytics-g);color:var(--src-analytics);border:1px solid rgba(64,204,143,.25)}
.src-pill.sp-util{background:var(--src-util-g);color:var(--src-util);border:1px solid rgba(239,150,55,.25)}
.src-pill.sp-plan{background:var(--src-plan-g);color:var(--src-plan);border:1px solid rgba(53,225,212,.25)}
.src-pill.sp-intel{background:var(--src-intel-g);color:var(--src-intel);border:1px solid rgba(53,225,212,.25)}

// ═══════════════════════════════════════════════
//  CHURN PREDICTION ENGINE
//  healthHistory[]: monthly snapshots stored in notes
//  calcChurnRisk(): derives 0-100 risk score from trajectory + signals + gaps
// ═══════════════════════════════════════════════
function calcChurnRisk(a){
  const n=a.notes||{};
  const hist=n.healthHistory||[];
  if(hist.length<2)return{score:0,level:'unknown',factors:[],trend:'flat'};
  const recent=hist.slice(-3);
  const older=hist.slice(-6,-3);
  // 1. Health trend (35%) — declining health is the strongest predictor
  const recentAvg=recent.reduce((s,h)=>s+h.health,0)/recent.length;
  const olderAvg=older.length>0?older.reduce((s,h)=>s+h.health,0)/older.length:recentAvg;
  const healthDelta=recentAvg-olderAvg;
  const trendDir=healthDelta<-8?'declining':healthDelta>5?'improving':'flat';
  const healthRisk=Math.min(35,Math.max(0,Math.round((-healthDelta/30)*35)));
  // 2. Signal trajectory (25%) — ratio of risk/critical to positive signals
  const signals=(a.softSignals||[]).filter(s=>!s.hidden&&s.status==='active');
  const negSigs=signals.filter(s=>s.type==='risk'||s.type==='critical').length;
  const posSigs=signals.filter(s=>s.type==='positive'||s.type==='expansion').length;
  const sigRatio=signals.length>0?negSigs/(negSigs+posSigs+0.1):0;
  const sigRisk=Math.min(25,Math.round(sigRatio*25));
  // 3. Checkpoint gaps (20%) — missed or unsigned checkpoints
  const cps=n.checkpoints||[];
  const overdueCps=cps.filter(c=>c.status==='not_held'&&c.scheduledDate&&(demoNow()-new Date(c.scheduledDate))/(86400000)>7).length;
  const heldNoSign=cps.filter(c=>c.status==='held'&&!c.signedOff).length;
  const cpRisk=Math.min(20,overdueCps*10+heldNoSign*5);
  // 4. Value gap (20%) — how far behind on the primary metric
  const mets=n.metrics||n.mt_metrics||[];
  const quantMet=mets.find(m=>m.type!=='qualitative'&&m.target&&m.currentValue);
  let valRisk=0;
  if(quantMet){
    const pct=parseFloat(String(quantMet.currentValue).replace(/[^0-9.]/g,''))/parseFloat(String(quantMet.target).replace(/[^0-9.]/g,''))||0;
    const dtr=a.dtr||365;
    // If <50% delivered with <90 days to renewal — high risk
    if(pct<0.5&&dtr<90)valRisk=20;
    else if(pct<0.75&&dtr<90)valRisk=12;
    else if(pct<0.5&&dtr<180)valRisk=10;
    else valRisk=Math.max(0,Math.round((1-pct)*10));
  }
  const total=Math.min(100,healthRisk+sigRisk+cpRisk+valRisk);
  const level=total>=65?'high':total>=35?'medium':'low';
  const factors=[];
  if(healthRisk>15)factors.push('Health declining \u2014 '+Math.abs(Math.round(healthDelta))+' point drop over 6 months');
  if(sigRisk>10)factors.push(negSigs+' risk/critical signals vs '+posSigs+' positive');
  if(cpRisk>10)factors.push(overdueCps+' overdue checkpoint'+(overdueCps!==1?'s':'')+', '+heldNoSign+' awaiting sign-off');
  if(valRisk>10)factors.push('Value delivery behind target'+(a.dtr?' with '+a.dtr+'d to renewal':''));
  return{score:total,level:level,factors:factors,trend:trendDir,components:{health:healthRisk,signals:sigRisk,checkpoints:cpRisk,value:valRisk}};
}

//  HEALTH ENGINE
// ═══════════════════════════════════════════════
function getMets(d,period){
  if(!d.hasData)return null;
  const s30=d.l3>0?d.l1/d.l3:.33,sFY=d.l3>0?(d.l6*2)/d.l3:2;
  if(period==="30d")return{logins:d.l1,active:Math.min(d.lu,Math.round(d.a3*s30)),hours:+(d.h3*s30).toFixed(1),abi:Math.round(d.ab3*s30),dl:Math.round(d.dl3*s30),mmd:Math.round(d.mm3*s30),sd:Math.round(d.sd3*s30),bm:Math.round(d.bm3*s30)};
  if(period==="FY")return{logins:d.l6*2,active:Math.min(d.lu,Math.round(d.a6*1.3)),hours:+(d.h3*sFY).toFixed(1),abi:Math.round(d.ab3*sFY),dl:Math.round(d.dl3*sFY),mmd:Math.round(d.mm3*sFY),sd:Math.round(d.sd3*sFY),bm:Math.round(d.bm3*sFY)};
  return{logins:d.l3,active:d.a3,hours:d.h3,abi:d.ab3,dl:d.dl3,mmd:d.mm3,sd:d.sd3,bm:d.bm3};
}

function calcProductScore(d,period){
  if(!d.hasData)return{score:0,dims:{trend:0,license:0,abi:0,breadth:0,depth:0},m:null};
  const m=getMets(d,period);
  const licenseS=d.pt==="Enterprise"?Math.min(100,Math.round((m.active/d.lu)*100+20)):Math.min(100,Math.round((m.active/d.lu)*130+10));
  const exp=d.l6/6||1,monthly=period==="30d"?d.l1:d.l3/3;
  const trendS=Math.min(100,Math.max(15,Math.round((monthly/exp)*80)));
  const abiS=Math.min(100,Math.max(15,Math.round((m.active>0?m.abi/m.active:0)*60+15)));
  const mods=[m.mmd>0,m.sd>0,m.bm>0,m.dl>0].filter(Boolean).length;
  const breadthS=Math.min(100,mods*28+(mods>=3?8:0));
  const depthS=Math.min(100,Math.round((m.active>0?m.hours/m.active:0)*18+10));
  const score=Math.round(trendS*.28+licenseS*.25+abiS*.22+breadthS*.15+depthS*.10);
  return{score,dims:{trend:trendS,license:licenseS,abi:abiS,breadth:breadthS,depth:depthS},m};
}

function getSignalValidityDays(type){
  return {critical:21,risk:45,positive:60,expansion:90,neutral:90}[type]||90;
}
function calcValidUntil(dateStr,type){
  const d=new Date(dateStr);
  d.setDate(d.getDate()+getSignalValidityDays(type));
  return d.toISOString().slice(0,10);
}

function updateSignalStatuses(){
  const today=demoToday();
  ACCOUNTS.forEach(a=>{
    (a.softSignals||[]).forEach(s=>{
      if(s.status==='active'&&s.validUntil){
        const vu=new Date(s.validUntil);
        vu.setHours(0,0,0,0);
        if(vu<today)s.status='expired';
      }
    });
  });
}

function calcSoftSignalScore(signals){
  if(!signals||signals.length===0)return 50;
  let score=50;
  const visible=signals.filter(s=>!s.hidden&&s.status==='active');
  visible.forEach(s=>{
    const w={critical:20,high:15,medium:10,low:5}[s.impact]||8;
    if(s.type==="positive"||s.type==="expansion")score+=w;
    else if(s.type==="risk")score-=w;
    else if(s.type==="critical")score-=w*1.5;
  });
  return Math.max(0,Math.min(100,Math.round(score)));
}

function calcHealth(d,period){
  if(!d.hasData){
    const ssScore=calcSoftSignalScore(d.softSignals);
    const score=Math.round(ssScore*0.5);
    const status=score>=33?{label:"Pre-Sales",col:"#4A00F8",bg:"#ede6ff",pill:"pp"}:{label:"At Risk",col:"#d88520",bg:"#fef0c0",pill:"pa"};
    return{score,status,productScore:0,softSignalScore:ssScore,dims:{trend:0,license:0,abi:0,breadth:0,depth:0},m:null};
  }
  const prod=calcProductScore(d,period);
  const ssScore=calcSoftSignalScore(d.softSignals);
  const score=Math.round(prod.score*0.5+ssScore*0.5);
  const status=score>=65?{label:"Healthy",col:"#2fb87a",bg:"#d4f5e5",pill:"pg"}:
    score>=48?{label:"At Risk",col:"#d88520",bg:"#fef0c0",pill:"pa"}:
    score>=32?{label:"Unhealthy",col:"#FD576B",bg:"#fff0e5",pill:"po"}:
    {label:"Critical",col:"#e63950",bg:"#ffe0e5",pill:"pr"};
  return{score,status,productScore:prod.score,softSignalScore:ssScore,dims:prod.dims,m:prod.m};
}

  let sigPts=15;
  if((sigCounts.expansion+sigCounts.positive)/total>0.5)sigPts=25;

  }

  // 4. ARR Growth vs Target — 20%
  const tierKey=a.tier||"Pre-contract";
  const typeKey=a.acctType||"Standard Growth";
  const arrTarget=(ARR_TARGETS[tierKey]||ARR_TARGETS["Pre-contract"])[typeKey]||0;
  const targetACV=a.currentACV*(1+arrTarget);
  const pipe=(a.plan?.plays||[]).filter(p=>!p.hidden).reduce((s,p)=>s+(p.value*(p.prob/100)),0);
  const projectedACV=a.currentACV+pipe;
  let arrPts=10; // default: behind
  let arrStatus="behind";
  const isNewAccount=typeKey==="New Account"||a.currentACV===0||arrTarget===0;
  if(isNewAccount){arrPts=10;arrStatus="n/a";}
  else if(projectedACV>=targetACV){arrPts=20;arrStatus="on_track";}
  else if(pipe>0){arrPts=10;arrStatus="behind";}
  else{arrPts=0;arrStatus="declining";}

  const score=Math.min(100,Math.max(0,healthPts+sigPts+renewPts+arrPts));
  let mode="retain";
  if(score<=39)mode="rescue";
  else if(score<=69)mode="retain";
  else mode="expand";

  // Hard override rules
  if(typeKey==="Retention"&&mode==="expand")mode="retain"; // Retention accounts never enter Expand

  // Hyper Growth utilization gate: if utilization < 50%, cap at Retain
  let utilizationGate=false;
  let seatUtilPct=0;
  if(a.hasData&&a.lu>0){
    const m=getMets(a,S.period);
    if(m){seatUtilPct=Math.round(m.active/a.lu*100);}
  }
  if(typeKey==="Hyper Growth"&&mode==="expand"&&seatUtilPct<50){
    mode="retain";
    utilizationGate=true;
  }

  return{score,mode,healthPts,sigPts,renewPts,arrPts,arrStatus,arrTarget:Math.round(arrTarget*100),targetACV:Math.round(targetACV),projectedACV:Math.round(projectedACV),utilizationGate,seatUtilPct};
}

function getAccountMode(a){
  if(a.plan&&a.plan.currentMode)return a.plan.currentMode;
  return calcAppetiteScore(a).mode;
}

function calcMetricStatusV18(m){
  if(m.statusOverride)return m.statusOverride;
  if(!m.currentValue&&m.currentValue!==0)return"grey";
  if(m.type==="qualitative"){return{High:"green",Medium:"amber",Low:"red"}[m.currentValue]||"grey";}
  const cur=parseFloat(String(m.currentValue).replace(/[^0-9.]/g,""))||0;
  const tgt=parseFloat(String(m.target).replace(/[^0-9.]/g,""))||1;
  const lowerIsBetter=m.unit==="hours"||m.unit==="days";
  if(lowerIsBetter){const ratio=cur/tgt;if(ratio<=1.1)return"green";if(ratio<=1.5)return"amber";return"red";}
  const pct=tgt>0?cur/tgt:0;
  if(pct>=0.75)return"green";if(pct>=0.50)return"amber";return"red";
}

function calcProgressPct(metric){
  if(metric.type==="qualitative")return{High:100,Medium:60,Low:30}[metric.currentValue]||0;
  const cur=parseFloat(String(metric.currentValue||"0").replace(/[^0-9.]/g,""))||0;
  const tgt=parseFloat(String(metric.target||"1").replace(/[^0-9.]/g,""))||1;
  const lowerIsBetter=metric.unit==="hours"||metric.unit==="days";
  if(lowerIsBetter)return cur<=tgt?100:Math.round((tgt/cur)*100);
  return Math.min(100,Math.round((cur/tgt)*100));
}

function formatMetricVal(metric){
  const v=metric.currentValue;if(v==null||v==="")return"\u2014";
  const pre=(metric.unit==="$"||metric.unit==="\u20ac")?metric.unit:"";
  const post=(metric.unit&&metric.unit!=="$"&&metric.unit!=="\u20ac")?metric.unit:"";
  const num=parseFloat(String(v).replace(/[^0-9.]/g,""));
  if(isNaN(num))return String(v);
  if(num>=1000000)return pre+(num/1000000).toFixed(1)+"M"+post;
  if(num>=1000)return pre+(num/1000).toFixed(0)+"K"+post;
  return pre+num+post;
}

function formatTargetVal(metric){
  const t=metric.target;if(t==null)return"\u2014";
  const pre=(metric.unit==="$"||metric.unit==="\u20ac")?metric.unit:"";
  const post=(metric.unit&&metric.unit!=="$"&&metric.unit!=="\u20ac")?metric.unit:"";
  const num=parseFloat(String(t).replace(/[^0-9.]/g,""));
  if(isNaN(num))return String(t);
  if(num>=1000000)return pre+(num/1000000).toFixed(1)+"M"+post;
  if(num>=1000)return pre+(num/1000).toFixed(0)+"K"+post;
  return pre+num+post;
}

function buildMetricSuggestions(account){
  const metrics=account.notes?.metrics||[];
  const signals=(account.softSignals||[]).filter(s=>!s.hidden&&s.status==="active");
  const suggestions=[];
  metrics.forEach(metric=>{
    const linkedRefIds=new Set(metric.linkedEntries.map(e=>e.refId).filter(Boolean));
    signals.forEach(sig=>{
      if(linkedRefIds.has(sig.id))return;
      if(metric.linkedEntries.find(e=>e.refId===sig.id&&e.dismissed))return;
      const qualCategories=["relationship","strategic"];
      const quantCategories=["commercial","product"];
      const isMatch=(metric.type==="qualitative"&&qualCategories.includes(sig.category))||(metric.type==="quantitative"&&quantCategories.includes(sig.category));
      if(isMatch)suggestions.push({metricId:metric.id,type:"signal",refId:sig.id,entry:sig});
    });
    (account.notes?.bvd_cycles||[]).forEach((cycle,ci)=>{
      if(cycle.status!=="delivered")return;
      const refId="bvd_"+ci;
      if(linkedRefIds.has(refId))return;
      suggestions.push({metricId:metric.id,type:"bvd",refId:refId,entry:cycle});
    });
    const seatUtil=account.lu>0?Math.round((account.a3/account.lu)*100):null;
    if(seatUtil!==null){
      const adoptionMetric=metric.metric.toLowerCase().includes("adopt")||metric.metric.toLowerCase().includes("utiliz");
      if(adoptionMetric&&seatUtil<80){
        const refId="util_auto";
        if(!linkedRefIds.has(refId)){
          suggestions.push({metricId:metric.id,type:"utilization",refId:refId,
            entry:{title:"Seat utilization at "+seatUtil+"%",desc:account.a3+" of "+account.lu+" licensed users active this period."}});
        }
      }
    }
  });
  return suggestions;
}

function buildSourceCountPills(metric){
  const typeCounts={};
  metric.linkedEntries.filter(e=>!e.dismissed).forEach(e=>{typeCounts[e.type]=(typeCounts[e.type]||0)+1;});
  return Object.entries(typeCounts).map(([type,count])=>srcPill(type,(SRC_PILL[type]?.icon||'\u270f')+' '+count)).join('');
}

function buildThread(metric,account){
  const entries=[];
  (metric.linkedEntries||[]).filter(e=>!e.dismissed).forEach(e=>{
    let title="",desc="",date="",sourceLabel="";
    if(e.type==="signal"){const sig=(account.softSignals||[]).find(s=>s.id===e.refId);if(!sig)return;title=sig.signal;desc=sig.desc;date=sig.date;sourceLabel="Signal \u00b7 "+sig.category;}
    else if(e.type==="activity"){const act=(account.activityFeed||[]).find(a=>a.id===e.refId);if(!act)return;title=act.title;desc=act.summary;date=act.date;sourceLabel={qbr:"QBR",csm_call:"CSM Call",exec_visit:"Exec Visit",research:"Research"}[act.type]||"Activity";}
    else if(e.type==="bvd"){const idx=parseInt(e.refId.replace("bvd_",""));const cycle=(account.notes?.bvd_cycles||[])[idx];if(!cycle)return;title="VDD "+cycle.cycleNum+" Delivered \u2014 "+cycle.period;desc=cycle.keyWins||"";date=cycle.deliveredDate||"";sourceLabel="VDD Delivery";}
    else if(e.type==="manual"){title=e.impactNote||"Note";desc="";date=e.linkedAt||"";sourceLabel="Note";}
    else if(e.type==="utilization"){title=e.impactNote||"Utilization event";desc=account.a3+" of "+account.lu+" users active.";date=e.linkedAt||"";sourceLabel="Utilization";}
    else if(e.type==="plan"){title=e.impactNote||"Account plan change";desc="";date=e.linkedAt||"";sourceLabel="Account Plan";}
    else if(e.type==="analytics"){title=e.impactNote||"Analytics event";desc="";date=e.linkedAt||"";sourceLabel="Analytics";}
    else if(e.type==="intel"){title=e.impactNote||"External intelligence";desc="";date=e.linkedAt||"";sourceLabel="Ext Intel";}
    entries.push({...e,title:title,desc:desc,date:date,sourceLabel:sourceLabel});
  });
  entries.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  entries.forEach((e,i)=>{e.nextType=entries[i+1]?.type||null;});
  return entries;
}

  const color=SRC_COLOR_VAR[entry.type]||'var(--src-manual)';
  const glow2=SRC_GLOW_VAR[entry.type]||'transparent';

  const sourceLabel=entry.sourceLabel||(SRC_PILL[entry.type]?.label||'Note');
  const routingBadge=entry.source==='auto'?'<span style="padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;background:var(--st-green-g);color:var(--st-green);border:1px solid rgba(64,204,143,.25)">auto</span>':entry.source==='suggested'?'<span style="font-size:9px;color:#5c6484">confirmed</span>':entry.source==='tagged'?'<span style="font-size:9px;color:#5c6484">tagged on entry</span>':"";
  const deltaColors={up:'var(--st-green-g),var(--st-green)',down:'var(--st-red-g),var(--st-red)',flat:'var(--mi-s2),#5c6484',warn:'var(--st-amber-g),var(--st-amber)'};
  const deltaIcon={up:'\u2191',down:'\u2193',flat:'\u2192',warn:'\u26a0'};
  const dKey=entry.impactDirection||'flat';
  const dPair=(deltaColors[dKey]||deltaColors.flat).split(',');
  const deltaBg=dPair[0];const deltaFg=dPair[1];
  const deltaHtml=entry.impactNote?'<div style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;background:'+deltaBg+';color:'+deltaFg+'">'+deltaIcon[dKey]+' '+entry.impactNote+'</div>':"";
  return '<div style="display:grid;grid-template-columns:24px 1fr;gap:0 14px;animation:fadeUp .3s ease '+(index*.05)+'s both">'+
    '<div style="display:flex;flex-direction:column;align-items:center;padding-top:3px">'+
      '<div style="width:12px;height:12px;border-radius:50%;background:'+color+';flex-shrink:0;box-shadow:0 0 0 3px var(--mi-s0),0 0 8px '+glow2+';position:relative;z-index:1"></div>'+
      (!isLast?'<div style="width:2px;flex:1;min-height:20px;margin-top:4px;border-radius:99px;background:linear-gradient('+color+'60,'+(nextColor||color)+'30)"></div>':'')+
    '</div>'+
    '<div style="background:var(--mi-s1);border:1px solid var(--mi-rim);border-radius:12px;padding:13px 16px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color .15s,box-shadow .15s" onmouseover="this.style.borderColor=\'var(--mi-rim-s)\';this.style.boxShadow=\'0 4px 20px rgba(0,0,0,.3)\'" onmouseout="this.style.borderColor=\'var(--mi-rim)\';this.style.boxShadow=\'none\'">'+
      '<div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:'+color+';border-radius:12px 0 0 12px"></div>'+
      '<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:7px">'+srcPill(entry.type,sourceLabel)+routingBadge+'<span style="font-size:10px;color:#5c6484;margin-left:auto">'+(entry.date||"")+'</span>'+
      '<button onclick="unlinkThreadEntry(\''+account.id+'\',\''+metric.id+'\','+index+')" style="background:none;border:1px solid rgba(255,255,255,.1);color:#5c6484;cursor:pointer;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px;transition:all .15s" onmouseover="this.style.borderColor=\'rgba(248,113,113,.4)\';this.style.color=\'#f87171\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,.1)\';this.style.color=\'#5c6484\'" title="Remove from metric">\u2715</button>'+
      '</div>'+
      '<div style="font-family:Georgia,serif;font-size:13px;font-weight:600;color:#f0f2f8;line-height:1.35;margin-bottom:5px">'+entry.title+'</div>'+
      '<div style="font-size:12px;color:#94a3b8;line-height:1.55">'+(entry.desc||"")+'</div>'+
      deltaHtml+
    '</div></div>';
}

function buildSuggestionEntry(sug,account,metric){
  let label="",desc="";
  if(sug.type==="signal"){const sig=(account.softSignals||[]).find(s=>s.id===sug.refId);if(!sig)return"";label=sig.signal;desc=sig.desc.slice(0,120)+(sig.desc.length>120?"\u2026":"");}
  else if(sug.type==="bvd"){label="VDD "+(sug.entry.cycleNum||"")+" \u2014 "+(sug.entry.period||"");desc=(sug.entry.keyWins||"").slice(0,100)+"\u2026";}
  else if(sug.type==="utilization"){label=sug.entry.title;desc=sug.entry.desc;}
  return '<div style="background:linear-gradient(135deg,var(--mi-s1),var(--mi-s2));border:1px dashed rgba(195,68,199,.40);border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px">'+
    '<div style="font-size:14px;flex-shrink:0;margin-top:1px">\u2726</div>'+
    '<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:var(--src-signal);margin-bottom:3px">Suggested link \u00b7 '+srcPill(sug.type)+'</div><div style="font-size:12px;color:#94a3b8;line-height:1.4"><strong style="color:#f0f2f8">'+label+'</strong> \u2014 '+desc+'</div></div>'+
    '<div style="display:flex;gap:6px;flex-shrink:0"><button onclick="confirmSuggestion(\''+account.id+'\',\''+metric.id+'\',\''+sug.refId+'\',\''+sug.type+'\')" style="padding:5px 12px;border-radius:6px;background:var(--src-signal);color:#0d0f14;font-size:10px;font-weight:800;border:none;cursor:pointer;font-family:inherit;letter-spacing:.04em">Link</button>'+
    '<button onclick="dismissSuggestion(\''+account.id+'\',\''+metric.id+'\',\''+sug.refId+'\')" style="padding:5px 10px;border-radius:6px;background:transparent;color:#5c6484;font-size:10px;font-weight:600;border:1px solid var(--mi-rim-s);cursor:pointer;font-family:inherit">Skip</button></div></div>';
}

function unlinkThreadEntry(acctId,metricId,entryIndex){
  const account=ACCOUNTS.find(a=>a.id===acctId);if(!account)return;
  const metric=(account.notes?.metrics||[]).find(m=>m.id===metricId);if(!metric)return;
  // Get the non-dismissed entries (same as what buildThread returns)
  const visible=metric.linkedEntries.filter(e=>!e.dismissed);
  // Sort newest first (same as buildThread)
  visible.sort((a,b)=>(b.linkedAt||"").localeCompare(a.linkedAt||""));
  const entry=visible[entryIndex];
  if(!entry)return;
  // Mark as dismissed instead of deleting (so it doesn't resurface as suggestion)
  entry.dismissed=true;
  render();
}
function openUpdateMetric(acctId,metricId){set({updateMetricModal:{acctId:acctId,metricId:metricId}});}

function parseSmartValue(val){
  if(!val)return val;
  const s=String(val).trim().replace(/[$\u20ac,]/g,'');
  const mMatch=s.match(/^([\d.]+)\s*[mM]$/);
  if(mMatch)return String(parseFloat(mMatch[1])*1000000);
  const kMatch=s.match(/^([\d.]+)\s*[kK]$/);
  if(kMatch)return String(parseFloat(kMatch[1])*1000);
  return s;
}

function saveMetricUpdate(acctId,metricId,newValue,note){
  const account=ACCOUNTS.find(a=>a.id===acctId);if(!account)return;
  const metric=(account.notes?.metrics||[]).find(m=>m.id===metricId);if(!metric)return;
  const today=new Date().toISOString().slice(0,10);
  if(newValue!=null&&newValue!=="")metric.currentValue=parseSmartValue(newValue);
  metric.lastUpdated=today;metric.lastUpdatedBy=S.user?.name||"CS";
  if(note&&note.trim()){
    metric.linkedEntries.unshift({type:"manual",refId:null,source:"manual",impactNote:note.trim(),impactDirection:null,linkedAt:today,linkedBy:S.user?.name||"CS",dismissed:false});
  }
  set({updateMetricModal:null});
}

function confirmSuggestion(acctId,metricId,refId,type){
  const account=ACCOUNTS.find(a=>a.id===acctId);if(!account)return;
  const metric=(account.notes?.metrics||[]).find(m=>m.id===metricId);if(!metric)return;
  const today=new Date().toISOString().slice(0,10);
  metric.linkedEntries.unshift({type:type,refId:refId,source:"suggested",impactNote:"",impactDirection:null,linkedAt:today,linkedBy:S.user?.name||"CS",dismissed:false});
  if(type==="signal"){const sig=(account.softSignals||[]).find(s=>s.id===refId);if(sig){if(!sig.linkedMetrics)sig.linkedMetrics=[];if(!sig.linkedMetrics.includes(metricId))sig.linkedMetrics.push(metricId);}}
  render();
}

function dismissSuggestion(acctId,metricId,refId){
  const account=ACCOUNTS.find(a=>a.id===acctId);if(!account)return;
  const metric=(account.notes?.metrics||[]).find(m=>m.id===metricId);if(!metric)return;
  metric.linkedEntries.push({type:"signal",refId:refId,source:"suggested",impactNote:"",impactDirection:null,linkedAt:new Date().toISOString().slice(0,10),linkedBy:"system",dismissed:true});
  render();
}

function addManualNote(acctId,metricId){
  const input=document.getElementById("note-input-"+metricId);
  if(!input||!input.value.trim())return;
  saveMetricUpdate(acctId,metricId,null,input.value.trim());
  input.value="";render();
}

function addMetric(acctId){
  const account=ACCOUNTS.find(a=>a.id===acctId);if(!account||!account.notes)return;
  if(!account.notes.metrics)account.notes.metrics=[];
  const newId="m"+Date.now();
  account.notes.metrics.push({id:newId,metric:"New Metric",type:"quantitative",unit:"",target:"",currentValue:"",lastUpdated:null,lastUpdatedBy:"",statusOverride:null,linkedEntries:[]});
  set({activeMetricId:newId});
}

function linkActivityToMetrics(acctId,activityId,links){
  const account=ACCOUNTS.find(a=>a.id===acctId);if(!account)return;
  const activity=(account.activityFeed||[]).find(a=>a.id===activityId);if(!activity)return;
  if(!activity.linkedMetrics)activity.linkedMetrics=[];
  const today=new Date().toISOString().slice(0,10);
  links.forEach(link=>{
    if(!activity.linkedMetrics.includes(link.metricId))activity.linkedMetrics.push(link.metricId);
    const metric=(account.notes?.metrics||[]).find(m=>m.id===link.metricId);if(!metric)return;
    metric.linkedEntries.unshift({type:"activity",refId:activityId,source:"tagged",impactNote:"",impactDirection:null,linkedAt:today,linkedBy:S.user?.name||"CS",dismissed:false});
    if(link.updatedValue!=null&&link.updatedValue!==""){metric.currentValue=link.updatedValue;metric.lastUpdated=today;metric.lastUpdatedBy=S.user?.name||"CS";}
  });
}

function buildAnalyticsEventBanner(account){
  const metrics=account.notes?.metrics||[];if(metrics.length===0)return"";
  const events=[];
  const prevActiveEst=account.a6?Math.round(account.a6/2):null;
  if(prevActiveEst&&account.a3){const delta=(account.a3-prevActiveEst)/prevActiveEst;if(Math.abs(delta)>=0.15){events.push({type:"analytics",title:"Active users "+(delta>0?"+":"")+Math.round(delta*100)+"% vs prior period",desc:account.a3+" active users this period (estimated "+prevActiveEst+" prior).",direction:delta>0?"up":"down",relevantMetricTypes:["adopt","utiliz","platform"]});}}
  const seatUtil=account.lu>0?Math.round(account.a3/account.lu*100):null;
  if(seatUtil!==null&&seatUtil<80){events.push({type:"utilization",title:"Seat utilization at "+seatUtil+"% ("+account.a3+"/"+account.lu+" users)",desc:"Below 80% threshold.",direction:"down",relevantMetricTypes:["adopt","utiliz","platform"]});}
  if(events.length===0)return"";
  return '<div style="background:#f8f9fc;border:1px solid var(--cb);border-radius:12px;padding:16px 20px;margin-bottom:20px">'+
    '<div style="font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--grn);margin-bottom:12px;font-family:inherit">\u2699 '+events.length+' system event'+(events.length>1?'s':'')+' \u2014 link to metrics?</div>'+
    '<div style="display:flex;flex-direction:column;gap:8px">'+events.map((ev,i)=>{
      const adoptMetric=metrics.find(m=>ev.relevantMetricTypes.some(t=>m.metric.toLowerCase().includes(t)));
      return '<div style="background:#fff;border:1px solid var(--cb);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:12px;border-left:3px solid var(--src-'+(ev.type==="utilization"?"util":"analytics")+')">'+
        srcPill(ev.type)+'<div style="flex:1;font-size:12px;color:var(--t2);line-height:1.4"><strong style="color:var(--t1)">'+ev.title+'</strong> '+ev.desc+'</div>'+
        (adoptMetric?'<div style="display:flex;gap:6px;flex-shrink:0"><button onclick="confirmAnalyticsEvent(\''+account.id+'\',\''+adoptMetric.id+'\',\''+ev.type+'\',\''+ev.title.replace(/'/g,"\\'")+'\',\''+ev.direction+'\')" class="btn bp btn-sm">Link to "'+adoptMetric.metric.slice(0,24)+'\u2026"</button><button onclick="void(0)" class="btn bg btn-sm">Skip</button></div>':'')+
      '</div>';
    }).join("")+'</div></div>';
}

function confirmAnalyticsEvent(acctId,metricId,type,title,direction){
  const account=ACCOUNTS.find(a=>a.id===acctId);if(!account)return;
  const metric=(account.notes?.metrics||[]).find(m=>m.id===metricId);if(!metric)return;
  const today=new Date().toISOString().slice(0,10);
  metric.linkedEntries.unshift({type:type,refId:type+"_auto_"+today,source:"auto",impactNote:title,impactDirection:direction,linkedAt:today,linkedBy:"system",dismissed:false});

function buildOverviewMetrics(account){

function buildOverviewMetricCard(metric,account){

  const stGlow={green:"rgba(64,204,143,.15)",amber:"rgba(239,150,55,.15)",red:"rgba(253,87,107,.15)",grey:"transparent"}[status]||"transparent";

  const action=getMetricAction(metric,status,account);
  const actionHtml=action?'<button style="padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;background:'+stGlow+';color:'+stColor+';border:1px solid '+stColor+'30;cursor:pointer;font-family:inherit;letter-spacing:.03em;transition:all .15s">'+action.label+'</button>':"";
  const pct=calcProgressPct(metric);
  return '<div style="background:var(--card);border:1px solid var(--cb);border-radius:12px;padding:14px 18px 12px;display:grid;grid-template-columns:3px 1fr auto;gap:0 16px;align-items:start;transition:all .18s;position:relative;overflow:hidden" onmouseover="this.style.transform=\'translateX(2px)\';this.style.borderColor=\'var(--blue)\'" onmouseout="this.style.transform=\'none\';this.style.borderColor=\'var(--cb)\'">'+

function getMetricAction(metric,status,account){
  if(status==="red"){
    const name=metric.metric.toLowerCase();
    if(name.includes("risk")||name.includes("disruption"))return{label:"\ud83d\udea8 Escalate risk"};
    if(name.includes("saving")||name.includes("cost"))return{label:"\ud83d\udcc4 Review savings evidence"};
    return{label:"\ud83d\udccb Update progress"};
  }
  if(status==="amber"){
    const name=metric.metric.toLowerCase();
    if(name.includes("saving")||name.includes("cost")||name.includes("avoid"))return{label:"\ud83d\udcc4 Document savings"};
    if(name.includes("supplier")||name.includes("rational"))return{label:"\ud83d\udd0d Run SD search"};
    if(name.includes("negotiat")||name.includes("kit"))return{label:"\ud83d\udcdd Request research"};
    return{label:"\ud83d\udccb Update progress"};
  }
  return null;
}

function addVPDMetricToMetrics(acctId,metricDef){

  const exists=account.notes.metrics.find(m=>m.metric===metricDef.metric);if(exists)return;

}

function getAccountUrgency(a){
  const crits=(a.softSignals||[]).filter(s=>s.impact==="critical"&&!s.hidden&&s.status==='active').length;
  const metrics=(a.notes?.metrics||[]);
  const offTrack=metrics.filter(m=>calcMetricStatusV18(m)==="red").length;
  let urgency=0;
  if(crits>0) urgency+=crits*30;
  if(a.dtr&&a.dtr<=90) urgency+=40;
  if(a.dtr&&a.dtr<=30) urgency+=30;
  if(offTrack>0) urgency+=offTrack*15;
  return urgency;
}

  const accts=myAccts();
  const wPipe=accts.reduce((s,a)=>s+(a.plan?.plays||[]).reduce((ps,p)=>ps+(p.value*(p.prob/100)),0),0);

  const urgentAccounts=accts.map(a=>{const u=getAccountUrgency(a);const reasons=[];
    const crits=(a.softSignals||[]).filter(s=>s.impact==="critical"&&!s.hidden&&s.status==='active').length;
    const offTrack=(a.notes?.metrics||[]).filter(m=>calcMetricStatusV18(m)==="red").length;

function getPlayLastTouched(account,play){
  const feed=(account.activityFeed||[]).filter(x=>!x.hidden);
  const titleWords=play.title.toLowerCase().split(/[\s_\-]+/).filter(w=>w.length>4);
  const related=feed.filter(act=>titleWords.some(w=>(act.title||'').toLowerCase().includes(w)||(act.summary||'').toLowerCase().includes(w)));
  const allDates=[...related,...feed].map(x=>x.date).filter(Boolean).sort().reverse();
  return allDates[0]||null;
}

function generateAccountBrief(a){
  const h=calcHealth(a,S.period);
  const n=a.notes||{};
  const mode=getAccountMode(a);
  const modeLabel=mode?PLAY_MODES[mode].label:"";
  const signals=(a.softSignals||[]).filter(s=>!s.hidden&&s.status==='active');
  const crits=signals.filter(s=>s.impact==='critical');
  const plays=(a.plan?.plays||[]).filter(p=>!p.hidden);
  const activePlays=plays.filter(p=>p.prob>=60);
  const metrics=n.metrics||[];
  const isSigned=!!n.gate_signed;

  // Line 1: Factual status — no judgment
  let brief=a.name+" \u2014 $"+(a.currentACV/1000).toFixed(0)+"K ACV, "+a.acctType+", "+a.tier+".";
  if(a.dtr) brief+=" Renewal in "+a.dtr+" days.";
  if(isSigned){const daysSince=Math.floor((demoNow()-new Date(n.gate_signedDate))/(86400000));brief+=" Live for "+daysSince+" days.";}
  brief+=" ";

  // Line 2: What needs attention — signals or metrics
  if(crits.length>0){
    brief+=crits.length+" critical signal"+(crits.length>1?"s":"")+": "+crits.map(s=>s.signal).join("; ")+". ";
  }else if(metrics.length>0){
    const offTrack=metrics.filter(m=>calcMetricStatusV18(m)==="red");
    const onTrack=metrics.filter(m=>calcMetricStatusV18(m)==="green");
    if(offTrack.length>0) brief+=offTrack.length+" metric"+(offTrack.length>1?"s":"")+" off track: "+offTrack.map(m=>m.metric).join(", ")+". ";
    else if(onTrack.length===metrics.length) brief+="All "+metrics.length+" metrics on track. ";
    else brief+=onTrack.length+" of "+metrics.length+" metrics on track. ";
  }else if(signals.length>0){
    brief+=signals.length+" active signal"+(signals.length>1?"s":"")+". ";
  }

  // Line 3: Next action — always specific
  if(a.dtr&&a.dtr<=90) brief+="Next: Prepare renewal proposal and document ROI evidence.";
  else if(crits.length>0) brief+="Next: Address critical signals before next stakeholder meeting.";
  else if(activePlays.length>0) brief+="Next: Advance "+activePlays[0].title+" ("+activePlays[0].prob+"% stage).";
  else if(n.gate_bvdDueDate){
    const days=Math.ceil((new Date(n.gate_bvdDueDate)-demoNow())/86400000);
    if(days<=30) brief+="Next: Draft and deliver VDD this quarter.";
    else brief+="Next: Continue building value evidence for upcoming VDD.";
  }else if(plays.length>0) brief+="Next: Progress "+plays[0].title+" to next stage.";
  else brief+="Next: Define success metrics and build pipeline.";

  return brief;
}

function generateThisWeekActions(a){
  const all=[];
  const n=a.notes||{};
  const signals=(a.softSignals||[]).filter(s=>!s.hidden&&s.status==='active');
  const crits=signals.filter(s=>s.impact==='critical');
  const plays=(a.plan?.plays||[]).filter(p=>!p.hidden);

  crits.slice(0,2).forEach(s=>{
    all.push({key:"sig_"+s.id,text:"Address: "+s.signal,priority:"high",icon:"\ud83d\udea8"});
  });
  if(a.dtr&&a.dtr<=90) all.push({key:"renewal",text:"Prepare renewal proposal ("+a.dtr+"d remaining)",priority:"high",icon:"\ud83d\udcc5"});
  if(n.gate_bvdDueDate){
    const days=Math.ceil((new Date(n.gate_bvdDueDate)-demoNow())/86400000);
    if(days<=30&&days>0) all.push({key:"vdd",text:"Draft VDD \u2014 due in "+days+" days",priority:"high",icon:"\ud83d\udcc4"});
  }
  plays.filter(p=>p.prob>=60).slice(0,2).forEach(p=>{
    all.push({key:"play_"+p.id,text:"Advance: "+p.title+" \u2014 "+getStageName(p.prob),priority:"medium",icon:"\ud83c\udfaf"});
  });
  const mtMetrics=(a.notes?.metrics||a.notes?.mt_metrics||[]);
  mtMetrics.forEach(sm=>{
    if(sm.lastUpdated){
      const daysSince=Math.floor((demoNow()-new Date(sm.lastUpdated))/86400000);
      if(daysSince>30) all.push({key:"metric_"+sm.id,text:"Update "+sm.metric+" \u2014 last updated "+daysSince+"d ago",priority:"medium",icon:"\ud83d\udcca"});
    }
  });
  // Filter out suppressed actions (completed within 7 days)
  const filtered=all.filter(act=>!isActionSuppressed(a.id,act.key));
  if(filtered.length===0) filtered.push({key:"ok",text:"All on track \u2014 maintain regular engagement",priority:"low",icon:"\u2713"});
  return filtered.slice(0,5);
}

function addMetricFromKit(acctId){
  const nameEl=document.getElementById('kit-metric-name');
  const unitEl=document.getElementById('kit-metric-unit');
  const targetEl=document.getElementById('kit-metric-target');
  if(!nameEl||!nameEl.value.trim())return;
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;if(!a.notes)a.notes={};if(!a.notes.metrics)a.notes.metrics=[];
  a.notes.metrics.push({id:"m"+Date.now(),metric:nameEl.value.trim(),type:unitEl.value===""?"qualitative":"quantitative",unit:unitEl.value,target:targetEl.value||"",currentValue:"",lastUpdated:null,lastUpdatedBy:"",statusOverride:null,linkedEntries:[]});
  nameEl.value="";targetEl.value="";render();
}
function removeMetricFromKit(acctId,metricId){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.metrics)return;
  a.notes.metrics=a.notes.metrics.filter(m=>m.id!==metricId);render();
}

function completeThisWeekAction(acctId,actionKey,checked){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a)return;
  if(!a.notes)a.notes={};if(!a.notes.completedActions)a.notes.completedActions={};
  if(checked){a.notes.completedActions[actionKey]=demoNow().toISOString();}
  else{delete a.notes.completedActions[actionKey];}
  // Also keep session state for immediate UI
  if(!S.completedActions)S.completedActions={};
  const sKey=acctId+"_"+actionKey;
  if(checked){S.completedActions[sKey]=true;}else{delete S.completedActions[sKey];}
  render();
}
function isActionSuppressed(acctId,actionKey){
  const a=ACCOUNTS.find(x=>x.id===acctId);if(!a||!a.notes||!a.notes.completedActions)return false;
  const ts=a.notes.completedActions[actionKey];if(!ts)return false;
  return(demoNow()-new Date(ts))/(86400000)<7;
}
